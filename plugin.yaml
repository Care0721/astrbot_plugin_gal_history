id: gal_history_today
name: Gal历史今日
description: 每日播报历史上今天发售的Galgame，整合VNDB、Bangumi、批评空间数据
version: 2.0.0
author: YourName
config:
  - name: target_groups
    type: list
    default: []
    description: 每日自动推送的群聊ID列表
  - name: push_time
    type: string
    default: "08:00"
    description: 每日播报时间 (HH:MM)
  - name: enable_bangumi
    type: boolean
    default: true
    description: 是否启用Bangumi数据补充
  - name: enable_erogamescape
    type: boolean
    default: false
    description: 是否尝试批评空间(需要自行安装sqlforerogamer库)
  - name: max_results
    type: integer
    default: 5
    description: 每次播报最多展示的作品数
  - name: proxy
    type: string
    default: ""
    description: 代理地址 (例如 http://127.0.0.1:7890)，留空则不使用