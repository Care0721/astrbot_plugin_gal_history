<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GalHub - 纺</title>
    
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/vue-router@4"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: '#0f172a',
                        card: '#1e293b',
                        primary: '#ec4899', 
                        secondary: '#a855f7',
                        accent: '#8b5cf6'
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out',
                        'slide-up': 'slideUp 0.4s ease-out',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #0f172a; color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.65); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: linear-gradient(145deg, rgba(30, 41, 59, 0.9), rgba(15, 23, 42, 0.9)); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .text-gradient { background: linear-gradient(to right, #ec4899, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .bg-gradient-primary { background: linear-gradient(135deg, #ec4899, #a855f7); }
        
        .page-enter-active, .page-leave-active { transition: opacity 0.3s ease, transform 0.3s ease; }
        .page-enter-from { opacity: 0; transform: translateY(10px); }
        .page-leave-to { opacity: 0; transform: translateY(-10px); }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        /* Skeleton Animation */
        @keyframes shimmer { 100% { transform: translateX(100%); } }
        .skeleton { position: relative; overflow: hidden; background-color: rgba(255,255,255,0.05); }
        .skeleton::after {
            position: absolute; top: 0; right: 0; bottom: 0; left: 0;
            transform: translateX(-100%);
            background-image: linear-gradient(90deg, rgba(255, 255, 255, 0) 0, rgba(255, 255, 255, 0.05) 20%, rgba(255, 255, 255, 0.1) 60%, rgba(255, 255, 255, 0));
            animation: shimmer 2s infinite; content: '';
        }
    </style>
</head>
<body class="selection:bg-primary/30 selection:text-white text-sm md:text-base">

<div id="app"></div>

<script type="text/x-template" id="app-layout">
    <div class="min-h-screen flex flex-col">
        <header :class="['fixed top-0 w-full z-50 transition-all duration-300', scrolled ? 'glass shadow-lg py-3' : 'bg-transparent py-5']">
            <div class="container mx-auto px-4 md:px-6 flex justify-between items-center">
                <router-link to="/" class="flex items-center gap-2 group">
                    <div class="w-10 h-10 rounded-xl bg-gradient-primary flex items-center justify-center shadow-lg shadow-primary/30 group-hover:scale-105 transition-transform">
                        <i class="fa-solid fa-gamepad text-white text-xl"></i>
                    </div>
                    <span class="text-2xl font-black italic tracking-wider text-white hidden sm:block">Gal<span class="text-gradient">Hub</span></span>
                </router-link>

                <div class="flex-1 max-w-xl mx-4 lg:mx-12 relative hidden md:block">
                    <div class="relative group">
                        <input type="text" v-model="globalSearch" @keyup.enter="handleSearch" placeholder="搜索游戏、社团、标签..." 
                               class="w-full bg-slate-800/80 border border-slate-700 rounded-full py-2.5 pl-12 pr-4 text-sm text-white placeholder-slate-400 focus:outline-none focus:border-primary/50 focus:ring-2 focus:ring-primary/20 transition-all">
                        <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors"></i>
                    </div>
                </div>

                <nav class="flex items-center gap-2 sm:gap-6">
                    <router-link to="/" class="text-slate-300 hover:text-white font-medium transition-colors" exact-active-class="text-primary font-bold">首页</router-link>
                    <router-link to="/list" class="text-slate-300 hover:text-white font-medium transition-colors" exact-active-class="text-primary font-bold">资源库</router-link>
                    <button @click="randomGame" class="text-slate-300 hover:text-secondary transition-colors" title="随便看看"><i class="fa-solid fa-dice"></i></button>
                    <div class="w-px h-6 bg-slate-700 hidden sm:block"></div>
                    <button class="bg-gradient-primary hover:opacity-90 text-white px-5 py-2 rounded-full font-medium shadow-lg shadow-primary/20 transition-all hover:scale-105 text-sm">
                        登录
                    </button>
                </nav>
            </div>
        </header>

        <main class="flex-1 pt-20">
            <router-view v-slot="{ Component }">
                <transition name="page" mode="out-in">
                    <component :is="Component" />
                </transition>
            </router-view>
        </main>

        <footer class="glass mt-20 py-8 text-center text-slate-500 text-sm">
            <div class="container mx-auto px-4">
                <p>© 2026 GalHub Resource Platform. All rights reserved.</p>
                <p class="mt-2 text-xs">This site is for demo purposes. Data is simulated.</p>
            </div>
        </footer>
    </div>
</script>

<script type="text/x-template" id="game-card">
    <div class="group relative rounded-xl overflow-hidden glass-card shadow-lg hover:shadow-primary/20 transition-all duration-300 hover:-translate-y-2 cursor-pointer flex flex-col h-full" @click="goToDetail">
        <div class="relative aspect-[3/4] overflow-hidden bg-slate-800">
            <img v-if="game.cover" :src="game.cover" :alt="game.title" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700 ease-out" loading="lazy">
            <div v-else class="w-full h-full flex items-center justify-center skeleton text-slate-600"><i class="fa-solid fa-image text-4xl"></i></div>
            
            <div class="absolute top-2 right-2 flex flex-col gap-1 items-end">
                <span class="bg-black/70 backdrop-blur text-yellow-400 text-xs font-bold px-2 py-1 rounded-md border border-yellow-400/30 flex items-center gap-1 shadow-lg">
                    <i class="fa-solid fa-star text-[10px]"></i> 9.{{ game.id % 10 }}
                </span>
            </div>
            <div class="absolute top-2 left-2 flex gap-1 flex-wrap w-2/3">
                <span v-if="game.isChinese" class="bg-primary/90 backdrop-blur text-white text-[10px] px-2 py-0.5 rounded shadow-sm">汉化</span>
            </div>

            <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-slate-900/40 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center">
                <button class="bg-white/20 hover:bg-primary backdrop-blur-md border border-white/30 text-white px-6 py-2 rounded-full font-medium transform translate-y-4 group-hover:translate-y-0 transition-all duration-300 shadow-[0_0_15px_rgba(236,72,153,0.5)]">
                    查看详情
                </button>
            </div>
        </div>

        <div class="p-4 flex flex-col flex-1">
            <h3 class="font-bold text-slate-100 line-clamp-2 leading-snug group-hover:text-primary transition-colors text-sm md:text-base">{{ game.title }}</h3>
            
            <div class="mt-auto pt-3 space-y-2">
                <div class="flex flex-wrap gap-1.5 h-[22px] overflow-hidden">
                    <span v-for="tag in game.tags.slice(0,3)" :key="tag" class="text-[10px] bg-slate-700/50 text-slate-300 px-1.5 py-0.5 rounded border border-slate-600">
                        {{ tag }}
                    </span>
                </div>
                <div class="flex items-center gap-2 text-slate-400 text-xs">
                    <i v-if="hasPlatform('PC')" class="fa-brands fa-windows"></i>
                    <i v-if="hasPlatform('Android')" class="fa-brands fa-android text-green-400/80"></i>
                    <span class="ml-auto text-[10px] opacity-70"><i class="fa-solid fa-fire text-orange-500 mr-1"></i>{{ 1000 + game.id * 123 }}</span>
                </div>
            </div>
        </div>
    </div>
</script>

<script type="text/x-template" id="view-home">
    <div class="animate-fade-in">
        <div class="container mx-auto px-4 md:px-6 mb-12 mt-4 relative group">
            <div v-if="loading" class="w-full h-[300px] md:h-[450px] rounded-2xl skeleton"></div>
            <div v-else class="relative w-full h-[300px] md:h-[450px] rounded-2xl overflow-hidden shadow-2xl shadow-primary/10">
                <transition name="fade" mode="out-in">
                    <div :key="currentBanner.id" class="absolute inset-0 cursor-pointer" @click="$router.push(`/game/${currentBanner.id}`)">
                        <img :src="currentBanner.bannerBg || currentBanner.cover" class="w-full h-full object-cover object-center scale-105" alt="Banner">
                        <div class="absolute inset-0 bg-gradient-to-r from-slate-900/90 via-slate-900/50 to-transparent"></div>
                        <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-transparent to-transparent"></div>
                        
                        <div class="absolute bottom-0 left-0 p-8 md:p-16 w-full md:w-2/3 transform transition-transform duration-500 hover:translate-x-2">
                            <span class="bg-primary text-white text-xs font-bold px-3 py-1 rounded-full mb-4 inline-block shadow-[0_0_10px_rgba(236,72,153,0.8)]">本周推荐</span>
                            <h2 class="text-3xl md:text-5xl font-black text-white mb-4 leading-tight drop-shadow-lg">{{ currentBanner.title }}</h2>
                            <p class="text-slate-300 line-clamp-2 md:line-clamp-3 mb-6 max-w-xl text-sm md:text-base text-shadow">{{ currentBanner.description }}</p>
                            <div class="flex gap-2">
                                <span v-for="tag in currentBanner.tags.slice(0,4)" class="glass px-3 py-1 rounded-full text-xs text-white border-white/20">{{ tag }}</span>
                            </div>
                        </div>
                    </div>
                </transition>
                
                <button @click.stop="prevBanner" class="absolute left-4 top-1/2 -translate-y-1/2 w-10 h-10 rounded-full glass flex items-center justify-center text-white opacity-0 group-hover:opacity-100 transition-opacity hover:bg-primary/50"><i class="fa-solid fa-chevron-left"></i></button>
                <button @click.stop="nextBanner" class="absolute right-4 top-1/2 -translate-y-1/2 w-10 h-10 rounded-full glass flex items-center justify-center text-white opacity-0 group-hover:opacity-100 transition-opacity hover:bg-primary/50"><i class="fa-solid fa-chevron-right"></i></button>
                
                <div class="absolute bottom-6 right-8 flex gap-2">
                    <button v-for="(item, index) in featuredGames" :key="index" @click="bannerIndex = index"
                            :class="['w-2 h-2 rounded-full transition-all duration-300', bannerIndex === index ? 'w-6 bg-primary' : 'bg-white/50 hover:bg-white']"></button>
                </div>
            </div>
        </div>

        <div class="container mx-auto px-4 md:px-6">
            <div class="flex flex-col lg:flex-row gap-8">
                <div class="flex-1">
                    <div class="flex justify-between items-end mb-6 border-b border-slate-700/50 pb-2">
                        <h2 class="text-2xl font-bold flex items-center gap-2"><i class="fa-solid fa-sparkles text-primary"></i> 最新入库</h2>
                        <router-link to="/list" class="text-sm text-slate-400 hover:text-primary transition-colors">查看全部 <i class="fa-solid fa-angle-right"></i></router-link>
                    </div>
                    
                    <div v-if="loading" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6">
                        <div v-for="i in 8" :key="i" class="skeleton rounded-xl aspect-[3/4]"></div>
                    </div>
                    <div v-else class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6">
                        <game-card v-for="game in latestGames" :key="game.id" :game="game" />
                    </div>
                </div>

                <div class="w-full lg:w-80">
                    <div class="flex justify-between items-end mb-6 border-b border-slate-700/50 pb-2">
                        <h2 class="text-2xl font-bold flex items-center gap-2"><i class="fa-solid fa-fire text-orange-500"></i> 热门榜单</h2>
                    </div>
                    
                    <div v-if="loading" class="space-y-4">
                        <div v-for="i in 5" :key="i" class="h-20 skeleton rounded-xl"></div>
                    </div>
                    <div v-else class="space-y-4">
                        <div v-for="(game, index) in hotGames" :key="game.id" @click="$router.push(`/game/${game.id}`)"
                             class="group flex gap-3 glass-card p-2.5 rounded-xl cursor-pointer hover:bg-slate-800 transition-colors relative overflow-hidden">
                            <div :class="['absolute top-0 left-0 w-6 h-6 flex items-center justify-center rounded-br-lg text-xs font-bold z-10 text-white', index === 0 ? 'bg-red-500' : index === 1 ? 'bg-orange-500' : index === 2 ? 'bg-yellow-500' : 'bg-slate-600']">
                                {{ index + 1 }}
                            </div>
                            
                            <img :src="game.cover" class="w-16 h-20 object-cover rounded-lg shadow-md group-hover:scale-105 transition-transform" alt="cover">
                            <div class="flex-1 flex flex-col justify-center overflow-hidden">
                                <h4 class="font-bold text-sm text-slate-200 truncate group-hover:text-primary transition-colors pl-1">{{ game.title }}</h4>
                                <div class="flex gap-1 mt-1 pl-1">
                                    <span class="text-[10px] bg-slate-700 text-slate-300 px-1.5 py-0.5 rounded">{{ game.tags[0] }}</span>
                                </div>
                                <span class="text-[10px] text-slate-500 mt-1 pl-1"><i class="fa-solid fa-arrow-trend-up mr-1 text-primary"></i>指数 {{ 9999 - index*800 }}</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</script>

<script type="text/x-template" id="view-list">
    <div class="container mx-auto px-4 md:px-6 py-6 animate-fade-in flex flex-col lg:flex-row gap-6">
        
        <button @click="showMobileFilter = !showMobileFilter" class="lg:hidden glass py-2 rounded-lg text-center font-medium border-primary/30 text-primary">
            <i class="fa-solid fa-filter mr-2"></i> 筛选与排序
        </button>

        <aside :class="['w-full lg:w-64 flex-shrink-0 lg:block', showMobileFilter ? 'block' : 'hidden']">
            <div class="glass-card rounded-2xl p-5 sticky top-24">
                <div class="mb-6 relative">
                    <input type="text" v-model="searchQuery" placeholder="在列表内搜索..." 
                           class="w-full bg-slate-900 border border-slate-700 rounded-lg py-2 pl-9 pr-3 text-sm focus:outline-none focus:border-primary/50 text-white">
                    <i class="fa-solid fa-search absolute left-3 top-2.5 text-slate-500"></i>
                </div>

                <div class="mb-6">
                    <h3 class="text-sm font-bold text-slate-400 mb-3 uppercase tracking-wider">排序方式</h3>
                    <div class="flex flex-wrap gap-2">
                        <button v-for="opt in sortOptions" :key="opt.value" @click="sortBy = opt.value"
                                :class="['px-3 py-1.5 rounded-md text-xs font-medium transition-colors border', sortBy === opt.value ? 'bg-primary/20 text-primary border-primary/50' : 'bg-slate-800 text-slate-300 border-slate-700 hover:bg-slate-700']">
                            {{ opt.label }}
                        </button>
                    </div>
                </div>

                <div class="mb-6">
                    <h3 class="text-sm font-bold text-slate-400 mb-3 uppercase tracking-wider">属性</h3>
                    <div class="flex flex-col gap-2">
                        <label class="flex items-center gap-2 cursor-pointer group">
                            <div class="relative flex items-center justify-center w-5 h-5 rounded border border-slate-600 bg-slate-800 group-hover:border-primary/50">
                                <input type="checkbox" v-model="filterChinese" class="peer opacity-0 absolute inset-0 cursor-pointer">
                                <i class="fa-solid fa-check text-[10px] text-white opacity-0 peer-checked:opacity-100 transition-opacity z-10"></i>
                                <div class="absolute inset-0 bg-primary rounded opacity-0 peer-checked:opacity-100 transition-opacity"></div>
                            </div>
                            <span class="text-sm text-slate-300 group-hover:text-white transition-colors">官方/民间汉化</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer group">
                            <div class="relative flex items-center justify-center w-5 h-5 rounded border border-slate-600 bg-slate-800 group-hover:border-primary/50">
                                <input type="checkbox" v-model="filterAndroid" class="peer opacity-0 absolute inset-0 cursor-pointer">
                                <i class="fa-solid fa-check text-[10px] text-white opacity-0 peer-checked:opacity-100 transition-opacity z-10"></i>
                                <div class="absolute inset-0 bg-primary rounded opacity-0 peer-checked:opacity-100 transition-opacity"></div>
                            </div>
                            <span class="text-sm text-slate-300 group-hover:text-white transition-colors">支持安卓运行</span>
                        </label>
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider">类型标签</h3>
                        <button v-if="selectedTags.length" @click="selectedTags = []" class="text-xs text-primary hover:underline">清空</button>
                    </div>
                    <div class="flex flex-wrap gap-1.5 max-h-[300px] overflow-y-auto no-scrollbar pb-2">
                        <button v-for="tag in allTags" :key="tag" @click="toggleTag(tag)"
                                :class="['px-2.5 py-1 rounded text-xs border transition-all duration-200', selectedTags.includes(tag) ? 'bg-secondary border-secondary text-white shadow-[0_0_8px_rgba(168,85,247,0.5)]' : 'bg-slate-800 border-slate-700 text-slate-400 hover:border-secondary/50 hover:text-slate-200']">
                            {{ tag }}
                        </button>
                    </div>
                </div>
            </div>
        </aside>

        <div class="flex-1 min-h-[500px]">
            <div class="mb-4 flex justify-between items-center bg-slate-800/40 p-3 rounded-lg border border-slate-700/50">
                <span class="text-sm text-slate-400">共找到 <span class="text-primary font-bold">{{ filteredGames.length }}</span> 个结果</span>
            </div>

            <div v-if="loading" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
                <div v-for="i in 10" :key="i" class="skeleton rounded-xl aspect-[3/4]"></div>
            </div>
            
            <div v-else-if="filteredGames.length === 0" class="flex flex-col items-center justify-center py-20 text-slate-500 glass-card rounded-2xl">
                <i class="fa-solid fa-ghost text-6xl mb-4 opacity-50"></i>
                <p>没有找到符合条件的游戏</p>
                <button @click="resetFilters" class="mt-4 px-4 py-2 border border-primary text-primary rounded-full hover:bg-primary hover:text-white transition-colors">重置筛选</button>
            </div>

            <div v-else class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 animate-slide-up">
                <game-card v-for="game in filteredGames" :key="game.id" :game="game" />
            </div>
        </div>
    </div>
</script>

<script type="text/x-template" id="view-detail">
    <div v-if="loading" class="container mx-auto px-4 py-10"><div class="skeleton h-96 w-full rounded-2xl"></div></div>
    <div v-else-if="!game" class="container mx-auto px-4 py-20 text-center"><h1 class="text-2xl">404 - 游戏未找到</h1></div>
    <div v-else class="animate-fade-in relative pb-20">
        
        <div class="absolute top-0 left-0 w-full h-[500px] overflow-hidden -z-10">
            <img :src="game.bannerBg || game.cover" class="w-full h-full object-cover opacity-30 blur-2xl scale-110" alt="bg">
            <div class="absolute inset-0 bg-gradient-to-b from-dark/40 via-dark/80 to-dark"></div>
        </div>

        <div class="container mx-auto px-4 md:px-6 pt-10">
            <div class="flex flex-col md:flex-row gap-8">
                <div class="w-full md:w-64 lg:w-80 flex-shrink-0 animate-slide-up">
                    <div class="rounded-2xl overflow-hidden shadow-[0_20px_50px_rgba(0,0,0,0.5)] border border-slate-700/50 bg-slate-800 relative group">
                        <img :src="game.cover" class="w-full aspect-[3/4] object-cover group-hover:scale-105 transition-transform duration-500" :alt="game.title">
                        <div v-if="game.isChinese" class="absolute top-4 left-4 bg-primary text-white text-xs font-bold px-3 py-1 rounded-full shadow-lg">汉化版</div>
                    </div>
                    
                    <div class="mt-6 flex flex-col gap-3">
                        <a href="#downloads" class="w-full bg-gradient-primary text-white font-bold py-3.5 rounded-xl shadow-lg shadow-primary/30 flex items-center justify-center gap-2 hover:scale-[1.02] transition-transform text-center">
                            <i class="fa-solid fa-download"></i> 获取资源
                        </a>
                        <div class="flex gap-3">
                            <button class="flex-1 glass py-2.5 rounded-xl text-slate-300 hover:text-white hover:bg-slate-700/50 transition-colors flex items-center justify-center gap-2">
                                <i class="fa-regular fa-heart"></i> 收藏
                            </button>
                            <button class="flex-1 glass py-2.5 rounded-xl text-slate-300 hover:text-white hover:bg-slate-700/50 transition-colors flex items-center justify-center gap-2">
                                <i class="fa-solid fa-share-nodes"></i> 分享
                            </button>
                        </div>
                    </div>
                </div>

                <div class="flex-1 text-slate-200 mt-2 md:mt-10 animate-slide-up" style="animation-delay: 0.1s;">
                    <h1 class="text-3xl md:text-5xl font-black text-white leading-tight mb-4 text-shadow">{{ game.title }}</h1>
                    
                    <div class="flex flex-wrap gap-4 items-center mb-6 text-sm">
                        <div class="flex items-center gap-1 bg-yellow-500/20 text-yellow-400 px-3 py-1 rounded-full border border-yellow-500/30">
                            <i class="fa-solid fa-star"></i> <span class="font-bold">9.{{ game.id % 10 }}</span> <span class="text-xs text-yellow-500/80">(245 评价)</span>
                        </div>
                        <span class="text-slate-400"><i class="fa-solid fa-building mr-1"></i> 未知社团/公司</span>
                        <span class="text-slate-400"><i class="fa-solid fa-calendar mr-1"></i> 2024-05-04</span>
                    </div>

                    <div class="mb-6 flex flex-wrap gap-2">
                        <span v-for="tag in game.tags" :key="tag" class="bg-slate-800/80 border border-slate-700 text-slate-300 px-3 py-1 rounded-lg text-sm hover:border-primary/50 transition-colors cursor-pointer">
                            {{ tag }}
                        </span>
                    </div>

                    <div class="glass-card p-5 rounded-2xl mb-8 border-l-4 border-l-primary">
                        <h3 class="text-lg font-bold text-white mb-2">作品简介</h3>
                        <p class="text-slate-300 leading-relaxed text-sm md:text-base whitespace-pre-line">{{ game.description || '暂无详细介绍...' }}</p>
                    </div>

                    <div>
                        <h3 class="text-sm font-bold text-slate-400 mb-3 uppercase">支持平台</h3>
                        <div class="flex gap-4">
                            <div v-for="p in groupedPlatforms" :key="p.type" class="flex flex-col items-center justify-center w-16 h-16 rounded-xl glass border border-slate-700/50 group hover:border-primary/50 transition-colors">
                                <i v-if="p.type === 'PC'" class="fa-brands fa-windows text-2xl text-blue-400 group-hover:text-blue-300"></i>
                                <i v-else-if="p.type === 'Android'" class="fa-brands fa-android text-2xl text-green-400 group-hover:text-green-300"></i>
                                <i v-else class="fa-solid fa-gamepad text-2xl text-purple-400"></i>
                                <span class="text-[10px] mt-1 text-slate-400 font-bold">{{ p.type }}</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mt-16 grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2 space-y-12">
                    
                    <section v-if="game.previewImages && game.previewImages.length">
                        <h2 class="text-2xl font-bold text-white mb-6 flex items-center gap-2"><i class="fa-solid fa-images text-secondary"></i> 游戏预览</h2>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div v-for="(img, idx) in game.previewImages" :key="idx" 
                                 class="rounded-xl overflow-hidden glass-card aspect-video cursor-pointer hover:ring-2 ring-primary/50 transition-all">
                                <img :src="img" class="w-full h-full object-cover hover:scale-105 transition-transform duration-500" alt="Preview">
                            </div>
                        </div>
                    </section>

                    <section>
                        <div class="flex justify-between items-end mb-6 border-b border-slate-700/50 pb-2">
                            <h2 class="text-2xl font-bold text-white flex items-center gap-2"><i class="fa-solid fa-comments text-blue-400"></i> 玩家评论 <span class="text-sm font-normal text-slate-400">(模拟)</span></h2>
                        </div>
                        
                        <div class="glass-card rounded-2xl p-4 md:p-6 space-y-6">
                            <div class="flex gap-4">
                                <div class="w-10 h-10 rounded-full bg-slate-700 flex-shrink-0"></div>
                                <div class="flex-1">
                                    <textarea placeholder="分享你的游玩感受..." class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white focus:outline-none focus:border-primary/50 resize-none" rows="2"></textarea>
                                    <div class="flex justify-end mt-2">
                                        <button class="bg-primary hover:bg-primary/80 text-white px-5 py-1.5 rounded-full text-sm font-medium transition-colors">发送</button>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="space-y-4">
                                <div v-for="i in 3" :key="i" class="flex gap-4 border-t border-slate-700/50 pt-4">
                                    <div class="w-10 h-10 rounded-full bg-gradient-to-br from-purple-500 to-pink-500 flex-shrink-0 flex items-center justify-center text-white font-bold"><i class="fa-solid fa-user"></i></div>
                                    <div>
                                        <div class="flex items-baseline gap-2 mb-1">
                                            <span class="font-bold text-sm text-slate-200">User_{{ 1024 + i*7 }}</span>
                                            <span class="text-xs text-slate-500">2天前</span>
                                        </div>
                                        <p class="text-slate-300 text-sm leading-relaxed">这个界面的设计参考了 touchgal 和 inarigal，确实很有那种现代资源站的味道了。下载部分也做得很清楚！</p>
                                        <div class="flex gap-4 mt-2 text-slate-500 text-xs">
                                            <button class="hover:text-primary transition-colors"><i class="fa-solid fa-thumbs-up"></i> {{ 10 * i }}</button>
                                            <button class="hover:text-white transition-colors"><i class="fa-solid fa-reply"></i> 回复</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>

                <div class="lg:col-span-1 space-y-6" id="downloads">
                    <h2 class="text-2xl font-bold text-white mb-6 flex items-center gap-2"><i class="fa-solid fa-box-archive text-green-400"></i> 下载地址</h2>
                    
                    <div class="space-y-4 sticky top-24">
                        <template v-for="(dlData, key) in game.downloads" :key="key">
                            <div v-if="dlData && dlData.url" class="glass-card p-4 rounded-xl border border-slate-700/50 hover:border-primary/30 transition-colors group">
                                <div class="flex items-center gap-3 mb-3">
                                    <div class="w-10 h-10 rounded-lg bg-slate-800 flex items-center justify-center text-xl text-slate-300 group-hover:text-primary transition-colors">
                                        <i v-if="key === 'PC'" class="fa-brands fa-windows"></i>
                                        <i v-else-if="key === 'android_direct'" class="fa-brands fa-android"></i>
                                        <i v-else class="fa-solid fa-mobile-screen"></i>
                                    </div>
                                    <div class="flex-1">
                                        <h4 class="font-bold text-slate-200 uppercase">{{ key === 'android_direct' ? '直装版 (APK)' : key }}</h4>
                                        <p class="text-[10px] text-slate-500">{{ dlData.source || '百度网盘 / 夸克' }}</p>
                                    </div>
                                </div>
                                <div v-if="dlData.instructions" class="text-xs text-slate-400 bg-slate-900/50 p-2 rounded mb-3 border border-slate-800">
                                    {{ dlData.instructions }}
                                </div>
                                <a :href="dlData.url" target="_blank" class="block w-full bg-slate-700 hover:bg-primary text-white text-center py-2 rounded-lg text-sm font-medium transition-colors">
                                    前往下载
                                </a>
                            </div>
                        </template>
                        
                        <div v-if="!hasAnyDownload" class="glass p-6 rounded-xl text-center text-slate-500">
                            <i class="fa-solid fa-link-slash text-3xl mb-2 opacity-50"></i>
                            <p class="text-sm">暂无可用下载链接</p>
                        </div>
                        
                        <div class="text-xs text-slate-500 bg-red-900/10 border border-red-900/30 p-3 rounded-xl mt-4">
                            <i class="fa-solid fa-triangle-exclamation text-red-500/80 mr-1"></i>
                            本站所有资源均来自网络收集，仅供学习交流使用。请在下载后24小时内删除。
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</script>


<script>
    const { createApp, ref, computed, onMounted, onUnmounted, watch } = Vue;
    const { createRouter, createWebHashHistory, useRoute, useRouter } = VueRouter;

    // --- Mock Data Generator (Fallback if API fails) ---
    const generateMockData = () => {
        const types = ['恋爱', '校园', '奇幻', 'NTR', '纯爱', '猎奇', '剧情', '治愈'];
        const arr = [];
        for(let i=1; i<=20; i++) {
            const isChinese = Math.random() > 0.3;
            const hasAndroid = Math.random() > 0.5;
            arr.push({
                id: i,
                title: `幻奏夜话~The Illusionary Serenade~ Vol.${i}`,
                cover: `https://picsum.photos/seed/gal${i}/400/600`,
                bannerBg: i <= 3 ? `https://picsum.photos/seed/bg${i}/1200/500` : null,
                previewImages: [`https://picsum.photos/seed/p1${i}/800/450`, `https://picsum.photos/seed/p2${i}/800/450`],
                tags: [types[i%types.length], types[(i+1)%types.length], isChinese ? '官方中文' : '生肉'],
                platforms: [{type: 'PC'}, hasAndroid ? {type: 'Android', sub: 'krkr'} : null].filter(Boolean),
                isChinese: isChinese,
                description: `这是一个关于爱与魔法的故事，发生在一个虚构的现代都市中。玩家将扮演男主角，与几位性格迥异的女主角展开一段段扣人心弦的故事。\n\n本作品包含丰富的剧情分支和精美的CG，音乐由知名社团制作。`,
                featured: i <= 3,
                downloads: {
                    PC: { url: '#', source: '百度网盘', instructions: '解压即玩' },
                    krkr: hasAndroid ? { url: '#', source: '夸克网盘', instructions: '需要使用模拟器' } : { url: null },
                    Ty: { url: null, source: null, instructions: null },
                    ONS: { url: null, source: null, instructions: null },
                    android_direct: { url: null, source: null, instructions: null }
                }
            });
        }
        return arr;
    };

    // --- Global State ---
    const globalGames = ref([]);
    const globalLoading = ref(true);

    // --- Fetch Logic ---
    const fetchData = async () => {
        globalLoading.value = true;
        try {
            // Attempt to fetch from real API
            const res = await fetch('https://galgame-api.fanggal.workers.dev');
            if(!res.ok) throw new Error('API Error');
            const data = await res.json();
            if(Array.isArray(data) && data.length > 0) {
                globalGames.value = data;
            } else {
                globalGames.value = generateMockData();
            }
        } catch(e) {
            console.log('Using mock data due to API error:', e);
            globalGames.value = generateMockData();
        } finally {
            globalLoading.value = false;
        }
    };

    // --- Components ---

    const GameCard = {
        template: '#game-card',
        props: ['game'],
        setup(props) {
            const router = useRouter();
            const hasPlatform = (type) => props.game.platforms && props.game.platforms.some(p => p.type === type);
            const goToDetail = () => { router.push(`/game/${props.game.id}`); };
            return { hasPlatform, goToDetail };
        }
    };

    const ViewHome = {
        template: '#view-home',
        components: { GameCard },
        setup() {
            const loading = computed(() => globalLoading.value);
            const bannerIndex = ref(0);
            
            const featuredGames = computed(() => {
                const feats = globalGames.value.filter(g => g.featured);
                return feats.length ? feats : globalGames.value.slice(0,3);
            });
            const currentBanner = computed(() => featuredGames.value[bannerIndex.value] || {});
            
            const latestGames = computed(() => [...globalGames.value].reverse().slice(0, 8));
            const hotGames = computed(() => {
                return [...globalGames.value].sort((a,b) => b.id - a.id).slice(2, 7); // Mock sorting
            });

            const nextBanner = () => { bannerIndex.value = (bannerIndex.value + 1) % featuredGames.value.length; };
            const prevBanner = () => { bannerIndex.value = (bannerIndex.value - 1 + featuredGames.value.length) % featuredGames.value.length; };

            let timer;
            onMounted(() => { timer = setInterval(nextBanner, 5000); });
            onUnmounted(() => { clearInterval(timer); });

            return { loading, featuredGames, currentBanner, bannerIndex, latestGames, hotGames, nextBanner, prevBanner };
        }
    };

    const ViewList = {
        template: '#view-list',
        components: { GameCard },
        setup() {
            const loading = computed(() => globalLoading.value);
            const searchQuery = ref('');
            const sortBy = ref('latest');
            const filterChinese = ref(false);
            const filterAndroid = ref(false);
            const selectedTags = ref([]);
            const showMobileFilter = ref(false);

            const sortOptions = [
                { label: '最新入库', value: 'latest' },
                { label: '热度最高', value: 'hot' },
                { label: '评分优先', value: 'rating' }
            ];

            const allTags = computed(() => {
                const tags = new Set();
                globalGames.value.forEach(g => { if(g.tags) g.tags.forEach(t => tags.add(t)); });
                return Array.from(tags).slice(0, 20); // limit display
            });

            const toggleTag = (tag) => {
                const idx = selectedTags.value.indexOf(tag);
                if(idx > -1) selectedTags.value.splice(idx, 1);
                else selectedTags.value.push(tag);
            };

            const resetFilters = () => {
                searchQuery.value = ''; sortBy.value = 'latest'; 
                filterChinese.value = false; filterAndroid.value = false; selectedTags.value = [];
            };

            const filteredGames = computed(() => {
                let res = globalGames.value;
                
                if(searchQuery.value) {
                    const q = searchQuery.value.toLowerCase();
                    res = res.filter(g => g.title.toLowerCase().includes(q) || (g.tags && g.tags.some(t => t.toLowerCase().includes(q))));
                }
                if(filterChinese.value) res = res.filter(g => g.isChinese);
                if(filterAndroid.value) res = res.filter(g => g.platforms && g.platforms.some(p => p.type === 'Android'));
                if(selectedTags.value.length) {
                    res = res.filter(g => g.tags && selectedTags.value.every(t => g.tags.includes(t)));
                }

                res = [...res]; // clone
                if(sortBy.value === 'latest') res.sort((a,b) => b.id - a.id);
                else if(sortBy.value === 'hot') res.sort(() => 0.5 - Math.random()); // mock
                else if(sortBy.value === 'rating') res.sort((a,b) => (b.id%10) - (a.id%10)); // mock

                return res;
            });

            return { 
                loading, searchQuery, sortBy, filterChinese, filterAndroid, selectedTags, showMobileFilter,
                sortOptions, allTags, toggleTag, resetFilters, filteredGames
            };
        }
    };

    const ViewDetail = {
        template: '#view-detail',
        setup() {
            const route = useRoute();
            const loading = computed(() => globalLoading.value);
            const game = computed(() => globalGames.value.find(g => g.id == route.params.id));

            const groupedPlatforms = computed(() => {
                if(!game.value || !game.value.platforms) return [];
                const map = {};
                game.value.platforms.forEach(p => {
                    if(!map[p.type]) map[p.type] = { type: p.type, subs: [] };
                    if(p.sub) map[p.type].subs.push(p.sub);
                });
                return Object.values(map);
            });

            const hasAnyDownload = computed(() => {
                if(!game.value || !game.value.downloads) return false;
                return Object.values(game.value.downloads).some(d => d && d.url);
            });

            onMounted(() => { window.scrollTo({top:0, behavior:'smooth'}); });

            return { loading, game, groupedPlatforms, hasAnyDownload };
        }
    };

    // --- Router Setup ---
    const router = createRouter({
        history: createWebHashHistory(),
        routes: [
            { path: '/', component: ViewHome },
            { path: '/list', component: ViewList },
            { path: '/game/:id', component: ViewDetail }
        ],
        scrollBehavior(to, from, savedPosition) {
            if (savedPosition) return savedPosition;
            return { top: 0 };
        }
    });

    // --- Main App ---
    const app = createApp({
        template: '#app-layout',
        setup() {
            const scrolled = ref(false);
            const globalSearch = ref('');
            const router = useRouter();

            const handleScroll = () => { scrolled.value = window.scrollY > 20; };
            
            const handleSearch = () => {
                if(globalSearch.value.trim()) {
                    router.push({ path: '/list' });
                    // Provide a slight delay for component mount if not on list page
                    setTimeout(() => {
                        const event = new CustomEvent('global-search', { detail: globalSearch.value });
                        window.dispatchEvent(event);
                        globalSearch.value = '';
                    }, 100);
                }
            };

            const randomGame = () => {
                if(globalGames.value.length) {
                    const rnd = globalGames.value[Math.floor(Math.random() * globalGames.value.length)];
                    router.push(`/game/${rnd.id}`);
                }
            };

            onMounted(() => {
                window.addEventListener('scroll', handleScroll);
                fetchData();
            });
            onUnmounted(() => window.removeEventListener('scroll', handleScroll));

            return { scrolled, globalSearch, handleSearch, randomGame };
        }
    });

    app.use(router);
    app.mount('#app');
</script>
</body>
</html>
