<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NekoGalgame - 琉璃资源库</title>
    <style>
        :root {
            --bg-deep: #0a0a0f;
            --bg-card: rgba(18, 16, 28, 0.75);
            --bg-glass: rgba(20, 18, 35, 0.6);
            --neon-purple: #b347ea;
            --neon-pink: #ff2d78;
            --neon-cyan: #00e5ff;
            --neon-blue: #5b6af0;
            --text-primary: #e0dce8;
            --text-secondary: #a09bb5;
            --border-glow: rgba(179, 71, 234, 0.4);
            --border-subtle: rgba(255, 255, 255, 0.08);
            --shadow-neon: 0 0 20px rgba(179, 71, 234, 0.35), 0 0 50px rgba(179, 71, 234, 0.12);
            --shadow-pink: 0 0 18px rgba(255, 45, 120, 0.4), 0 0 40px rgba(255, 45, 120, 0.15);
            --font-main: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
            --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', 'Monaco', 'Courier New', monospace;
            --radius-lg: 18px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }
        body {
            background: var(--bg-deep);
            color: var(--text-primary);
            font-family: var(--font-main);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            position: relative;
        }
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        #bootScreen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #06060b;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            font-family: var(--font-mono);
            transition: opacity 0.7s ease, visibility 0.7s ease;
            pointer-events: all;
        }
        #bootScreen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        #bootScreen .boot-container {
            background: rgba(10, 8, 20, 0.9);
            border: 1px solid rgba(179, 71, 234, 0.5);
            border-radius: 12px;
            padding: 30px 40px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 0 40px rgba(179, 71, 234, 0.3), inset 0 0 20px rgba(0, 0, 0, 0.6);
            position: relative;
            overflow: hidden;
        }
        #bootScreen .boot-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.04) 2px, rgba(0, 0, 0, 0.04) 4px);
            pointer-events: none;
            z-index: 2;
            border-radius: 12px;
        }
        #bootScreen .boot-header {
            color: var(--neon-cyan);
            font-size: 0.85rem;
            letter-spacing: 2px;
            margin-bottom: 16px;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.6);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #bootScreen .boot-header .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--neon-cyan);
            animation: bootDotPulse 1s infinite;
            box-shadow: 0 0 8px var(--neon-cyan);
        }
        @keyframes bootDotPulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.2;
            }
        }
        #bootScreen .boot-line {
            color: #7ecf8a;
            font-size: 0.78rem;
            margin: 4px 0;
            opacity: 0;
            animation: bootLineAppear 0.25s forwards;
            text-shadow: 0 0 4px rgba(126, 207, 138, 0.4);
        }
        #bootScreen .boot-line:nth-child(2) {
            animation-delay: 0.2s;
        }
        #bootScreen .boot-line:nth-child(3) {
            animation-delay: 0.45s;
        }
        #bootScreen .boot-line:nth-child(4) {
            animation-delay: 0.7s;
        }
        #bootScreen .boot-line:nth-child(5) {
            animation-delay: 0.95s;
        }
        #bootScreen .boot-line:nth-child(6) {
            animation-delay: 1.2s;
            color: #f0c060;
            text-shadow: 0 0 6px rgba(240, 192, 96, 0.5);
        }
        #bootScreen .boot-line:nth-child(7) {
            animation-delay: 1.5s;
            color: var(--neon-pink);
            text-shadow: 0 0 8px rgba(255, 45, 120, 0.6);
            font-size: 0.9rem;
            letter-spacing: 1px;
        }
        @keyframes bootLineAppear {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        #bootScreen .boot-cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background: var(--neon-cyan);
            margin-left: 2px;
            animation: bootCursorBlink 0.7s infinite;
            vertical-align: middle;
            box-shadow: 0 0 6px var(--neon-cyan);
        }
        @keyframes bootCursorBlink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0;
            }
        }

        #appContainer {
            position: relative;
            z-index: 1;
            opacity: 0;
            transition: opacity 0.6s ease 0.3s;
        }
        #appContainer.visible {
            opacity: 1;
        }

        .nav-bar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 8, 22, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-subtle);
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            transition: all var(--transition-smooth);
        }
        .nav-bar.scrolled {
            box-shadow: 0 4px 35px rgba(179, 71, 234, 0.2);
            border-bottom-color: rgba(179, 71, 234, 0.35);
        }
        .nav-logo {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 1px;
            cursor: pointer;
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            white-space: nowrap;
            transition: all var(--transition-fast);
        }
        .nav-logo:hover {
            filter: brightness(1.3);
            transform: scale(1.03);
        }
        .nav-links {
            display: flex;
            gap: 8px;
            align-items: center;
            list-style: none;
        }
        .nav-links li a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all var(--transition-fast);
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            white-space: nowrap;
        }
        .nav-links li a:hover,
        .nav-links li a.active {
            color: #fff;
            background: rgba(179, 71, 234, 0.2);
            box-shadow: 0 0 15px rgba(179, 71, 234, 0.3);
        }
        .nav-links li a.active {
            border: 1px solid rgba(179, 71, 234, 0.45);
            box-shadow: 0 0 20px rgba(179, 71, 234, 0.4);
        }
        .nav-search {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 25px;
            padding: 7px 16px;
            transition: all var(--transition-smooth);
            max-width: 220px;
        }
        .nav-search:focus-within {
            border-color: var(--neon-purple);
            box-shadow: 0 0 18px rgba(179, 71, 234, 0.35);
            background: rgba(255, 255, 255, 0.07);
        }
        .nav-search input {
            background: transparent;
            border: none;
            color: #fff;
            outline: none;
            font-size: 0.85rem;
            width: 140px;
            font-family: var(--font-main);
        }
        .nav-search input::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }
        .nav-search .search-icon {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            cursor: pointer;
            transition: color var(--transition-fast);
        }
        .nav-search .search-icon:hover {
            color: var(--neon-cyan);
        }
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 6px;
            z-index: 110;
        }
        .hamburger span {
            width: 26px;
            height: 2.5px;
            background: #fff;
            border-radius: 2px;
            transition: all var(--transition-fast);
        }
        .hamburger.open span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }
        .hamburger.open span:nth-child(2) {
            opacity: 0;
        }
        .hamburger.open span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }

        .main-content {
            padding: 20px 24px 40px;
            max-width: 1300px;
            margin: 0 auto;
            min-height: 70vh;
        }
        .main-content.glitching {
            animation: glitchContent 0.35s ease;
        }
        @keyframes glitchContent {
            0% {
                transform: translate(0);
                filter: none;
            }
            10% {
                transform: translate(-6px, 3px);
                filter: hue-rotate(20deg) brightness(1.3);
            }
            20% {
                transform: translate(5px, -2px);
                filter: hue-rotate(-15deg) brightness(0.8);
            }
            30% {
                transform: translate(-3px, -4px);
                filter: hue-rotate(10deg);
            }
            40% {
                transform: translate(4px, 2px);
                filter: none;
            }
            50% {
                transform: translate(-2px, 1px);
                filter: brightness(1.1);
            }
            60% {
                transform: translate(0);
                filter: none;
            }
            100% {
                transform: translate(0);
                filter: none;
            }
        }

        .banner-section {
            position: relative;
            width: 100%;
            height: 320px;
            border-radius: var(--radius-lg);
            overflow: hidden;
            margin-bottom: 30px;
            border: 1px solid var(--border-subtle);
            box-shadow: var(--shadow-neon);
            background: #0d0b1a;
        }
        .banner-slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.7s ease;
            display: flex;
            align-items: flex-end;
            padding: 30px 36px;
            cursor: pointer;
        }
        .banner-slide.active {
            opacity: 1;
            z-index: 2;
        }
        .banner-slide .banner-bg {
            position: absolute;
            inset: 0;
            z-index: 0;
            background-size: cover;
            background-position: center;
            filter: brightness(0.4) saturate(1.2);
        }
        .banner-slide .banner-overlay {
            position: absolute;
            inset: 0;
            z-index: 1;
            background: linear-gradient(0deg, rgba(10, 8, 20, 0.95) 15%, rgba(10, 8, 20, 0.3) 60%, rgba(10, 8, 20, 0.05) 100%);
        }
        .banner-info {
            position: relative;
            z-index: 3;
            max-width: 600px;
        }
        .banner-info .banner-tag {
            display: inline-block;
            background: var(--neon-pink);
            color: #fff;
            font-size: 0.7rem;
            padding: 4px 12px;
            border-radius: 12px;
            letter-spacing: 1px;
            margin-bottom: 8px;
            box-shadow: var(--shadow-pink);
            text-transform: uppercase;
        }
        .banner-info h2 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 6px;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
            color: #fff;
        }
        .banner-info p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            line-height: 1.5;
        }
        .banner-dots {
            position: absolute;
            bottom: 16px;
            right: 30px;
            z-index: 4;
            display: flex;
            gap: 8px;
        }
        .banner-dots span {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.35);
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        .banner-dots span.active {
            background: var(--neon-pink);
            box-shadow: 0 0 12px var(--neon-pink);
        }
        .banner-arrow {
            position: absolute;
            top: 50%;
            z-index: 5;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
            backdrop-filter: blur(6px);
        }
        .banner-arrow:hover {
            background: rgba(179, 71, 234, 0.4);
            border-color: var(--neon-purple);
            box-shadow: 0 0 20px rgba(179, 71, 234, 0.5);
        }
        .banner-arrow.left {
            left: 16px;
        }
        .banner-arrow.right {
            right: 16px;
        }

        .section-title {
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
        }
        .section-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(180deg, var(--neon-purple), var(--neon-pink));
            border-radius: 2px;
            box-shadow: 0 0 12px rgba(179, 71, 234, 0.6);
        }
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }
        .game-card {
            background: var(--bg-card);
            border-radius: var(--radius-md);
            overflow: hidden;
            cursor: pointer;
            border: 1px solid var(--border-subtle);
            transition: all var(--transition-smooth);
            position: relative;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .game-card:hover {
            transform: translateY(-8px);
            border-color: var(--border-glow);
            box-shadow: var(--shadow-neon);
            z-index: 5;
        }
        .game-card .card-cover {
            width: 100%;
            aspect-ratio: 3/4;
            object-fit: cover;
            display: block;
            background: linear-gradient(135deg, #1a1535, #251840);
            transition: all var(--transition-smooth);
        }
        .game-card:hover .card-cover {
            filter: brightness(1.15) saturate(1.1);
        }
        .game-card .card-body {
            padding: 12px 14px;
            position: relative;
        }
        .game-card .card-title {
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 6px;
            color: #fff;
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .game-card .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        .card-tag {
            font-size: 0.68rem;
            padding: 3px 9px;
            border-radius: 10px;
            letter-spacing: 0.5px;
            font-weight: 500;
            white-space: nowrap;
        }
        .tag-platform-pc {
            background: rgba(91, 106, 240, 0.25);
            color: #8fa4ff;
            border: 1px solid rgba(91, 106, 240, 0.35);
        }
        .tag-platform-android {
            background: rgba(0, 229, 255, 0.15);
            color: #5eeeff;
            border: 1px solid rgba(0, 229, 255, 0.3);
        }
        .tag-chinese {
            background: rgba(126, 207, 138, 0.2);
            color: #8ff0a0;
            border: 1px solid rgba(126, 207, 138, 0.3);
        }
        .tag-sub {
            background: rgba(255, 45, 120, 0.18);
            color: #ff6b98;
            border: 1px solid rgba(255, 45, 120, 0.3);
            font-size: 0.62rem;
        }
        .game-card .card-glow {
            position: absolute;
            inset: -2px;
            border-radius: var(--radius-md);
            opacity: 0;
            pointer-events: none;
            background: transparent;
            box-shadow: 0 0 30px rgba(179, 71, 234, 0.5), 0 0 15px rgba(255, 45, 120, 0.3);
            transition: opacity var(--transition-smooth);
            z-index: -1;
        }
        .game-card:hover .card-glow {
            opacity: 1;
        }

        .filter-section {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 24px;
            align-items: center;
        }
        .filter-group-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            letter-spacing: 1px;
            margin-right: 4px;
            white-space: nowrap;
        }
        .filter-btn {
            padding: 7px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            transition: all var(--transition-fast);
            white-space: nowrap;
            font-family: var(--font-main);
        }
        .filter-btn:hover {
            border-color: var(--neon-purple);
            color: #fff;
            box-shadow: 0 0 12px rgba(179, 71, 234, 0.3);
        }
        .filter-btn.active {
            background: rgba(179, 71, 234, 0.25);
            border-color: var(--neon-purple);
            color: #fff;
            box-shadow: 0 0 16px rgba(179, 71, 234, 0.45);
            font-weight: 600;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all var(--transition-smooth);
            padding: 20px;
        }
        .modal-overlay.open {
            opacity: 1;
            visibility: visible;
        }
        .modal-dialog {
            background: rgba(18, 16, 30, 0.9);
            border: 1px solid rgba(179, 71, 234, 0.45);
            border-radius: var(--radius-lg);
            max-width: 900px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 28px;
            position: relative;
            box-shadow: 0 0 50px rgba(179, 71, 234, 0.35), 0 0 100px rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            animation: modalIn 0.3s ease;
        }
        @keyframes modalIn {
            from {
                transform: translateY(30px) scale(0.94);
                opacity: 0;
            }
            to {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }
        .modal-close {
            position: sticky;
            top: 0;
            float: right;
            z-index: 10;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.25);
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
            backdrop-filter: blur(8px);
        }
        .modal-close:hover {
            background: rgba(255, 45, 120, 0.4);
            border-color: var(--neon-pink);
            box-shadow: 0 0 20px rgba(255, 45, 120, 0.5);
        }
        .modal-body {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .modal-cover-wrap {
            flex: 0 0 220px;
            border-radius: var(--radius-md);
            overflow: hidden;
            border: 1px solid var(--border-subtle);
            box-shadow: 0 0 25px rgba(179, 71, 234, 0.25);
        }
        .modal-cover-wrap img {
            width: 100%;
            display: block;
            aspect-ratio: 3/4;
            object-fit: cover;
            background: linear-gradient(135deg, #1a1535, #251840);
        }
        .modal-info {
            flex: 1;
            min-width: 250px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .modal-info h2 {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 1px;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }
        .modal-tags-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .modal-tag {
            font-size: 0.72rem;
            padding: 5px 12px;
            border-radius: 14px;
            letter-spacing: 0.5px;
            font-weight: 500;
        }
        .modal-description {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.7;
            background: rgba(255, 255, 255, 0.02);
            padding: 14px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-subtle);
        }
        .preview-row {
            display: flex;
            gap: 12px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        .preview-row img {
            width: 100px;
            height: 75px;
            object-fit: cover;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-subtle);
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        .preview-row img:hover {
            border-color: var(--neon-purple);
            box-shadow: 0 0 15px rgba(179, 71, 234, 0.5);
            transform: scale(1.05);
        }
        .modal-dl-section {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 6px;
        }
        .btn-dl {
            padding: 10px 18px;
            border-radius: 25px;
            border: 1px solid var(--neon-purple);
            background: rgba(179, 71, 234, 0.2);
            color: #fff;

        // 初始化下载对象（兼容缺失字段）
        gamesData.forEach(g => {
            if (!g.downloads) g.downloads = { PC: null, krkr: null, Ty: null, ONS: null, android_direct: null };
            if (!g.previewImages) g.previewImages = [];
        });

        // ==================== 本地存储管理 ====================
        function getLikeCount(gameId) {
            return parseInt(localStorage.getItem(`like_${gameId}`) || '0');
        }
        function setLikeCount(gameId, count) {
            localStorage.setItem(`like_${gameId}`, count);
        }
        function isLikedByUser(gameId) {
            return localStorage.getItem(`userLiked_${gameId}`) === 'true';
        }
        function setUserLiked(gameId, liked) {
            localStorage.setItem(`userLiked_${gameId}`, liked ? 'true' : 'false');
        }
        function getComments(gameId) {
            return JSON.parse(localStorage.getItem(`comments_${gameId}`) || '[]');
        }
        function saveComments(gameId, comments) {
            localStorage.setItem(`comments_${gameId}`, JSON.stringify(comments));
        }
        function addComment(gameId, name, text) {
            const comments = getComments(gameId);
            comments.unshift({ name, text, time: Date.now() });
            if (comments.length > 200) comments.pop(); // 限制数量
            saveComments(gameId, comments);
            return comments;
        }

        // ==================== 全局状态 ====================
        let currentPage = 'home';
        let currentFilter = 'all';

        let onlineSeconds = 0;

        function getPlatformLabel(platform) {
            if (platform.type === 'PC') return { text: 'PC', cls: 'tag-platform-pc' };
            if (platform.sub === 'krkr') return { text: '安卓·krkr', cls: 'tag-platform-android' };

            if (platform.sub === 'android_direct') return { text: '安卓直装', cls: 'tag-platform-android' };
            return { text: '安卓', cls: 'tag-platform-android' };
        }
        function getTagsHTML(game) {
            let html = '';
            game.platforms?.forEach(p => {
                const pl = getPlatformLabel(p);
                html += `<span class="card-tag ${pl.cls}">${pl.text}</span>`;
            });
            if (game.isChinese) html += '<span class="card-tag tag-chinese">汉化</span>';

                html +=
                    `<span class="card-tag" style="background:rgba(255,255,255,0.06);color:#bbb;border:1px solid rgba(255,255,255,0.12);">${t}</span>`;

                </div>`;
        }

        // ==================== 路由与刷新保持 ====================
        function setHash(hash) {
            window.location.hash = hash;
        }

            return window.location.hash.slice(1); // 去掉#
        }
        function handleRouteChange() {
            const hash = getHash();
            if (hash.startsWith('detail/')) {
                const gameId = parseInt(hash.split('/')[1]);
                if (!isNaN(gameId)) {
                    // 恢复详情页
                    navigateTo('home', true); // 静默切换到首页作为底层
                    openGameDetail(gameId);
                }
            } else if (hash === 'category') {
                navigateTo('category', true);
            } else {
                navigateTo('home', true);
            }
        }
        window.addEventListener('hashchange', handleRouteChange);

        // 初始加载时根据hash显示
        function initialRoute() {
            const hash = getHash();
            if (hash.startsWith('detail/')) {
                const gameId = parseInt(hash.split('/')[1]);
                if (!isNaN(gameId)) {
                    navigateTo('home', true);
                    setTimeout(() => openGameDetail(gameId), 100);

        // ==================== 启动动画与粒子 ====================
        function initBootSequence() {
            const bootScreen = document.getElementById('bootScreen');
            const appContainer = document.getElementById('appContainer');
            setTimeout(() => {
                bootScreen.classList.add('hidden');
                appContainer.classList.add('visible');
                initParticles();
                initialRoute(); // 根据hash加载页面
                startBannerAutoplay();
                startOnlineTimer();
                setTimeout(() => {
                    if (bootScreen.parentNode) bootScreen.parentNode.removeChild(bootScreen);
                }, 800);
            }, 2200);
        }

        function initParticles() {
            const canvas = document.getElementById('particleCanvas');
            const ctx = canvas.getContext('2d');
            let particles = [];
            const isMobile = window.innerWidth < 768;
            const particleCount = isMobile ? 35 : 80;

            function resize() { canvas.width = window.innerWidth;
                canvas.height = window.innerHeight; }
            resize();
            window.addEventListener('resize', () => { resize();
                initParticlesArray(); });

            function initParticlesArray() {
                particles = [];
                for (let i = 0; i < particleCount; i++) {
                    particles.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        vx: (Math.random() - 0.5) * 0.6,
                        vy: (Math.random() - 0.5) * 0.6,
                        radius: Math.random() * 2.2 + 0.6,
                        alpha: Math.random() * 0.5 + 0.2,
                        color: Math.random() < 0.5 ? '179,71,234' : '255,45,120',
                    });
                }
            }
            initParticlesArray();

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    if (p.x < 0) p.x = canvas.width;
                    if (p.x > canvas.width) p.x = 0;
                    if (p.y < 0) p.y = canvas.height;
                    if (p.y > canvas.height) p.y = 0;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${p.color},${p.alpha})`;
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius * 3, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${p.color},${p.alpha * 0.15})`;
                    ctx.fill();
                });
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 120) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `rgba(179,71,234,${0.08 * (1 - dist / 120)})`;
                            ctx.lineWidth = 0.6;
                            ctx.stroke();
                        }
                    }
                }
                requestAnimationFrame(animate);
            }
            animate();
        }

        function startOnlineTimer() {
            const timerEl = document.getElementById('onlineTimer');
            if (!timerEl) return;
            onlineTimerInterval = setInterval(() => {
                onlineSeconds++;
                const h = Math.floor(onlineSeconds / 3600);
                const m = Math.floor((onlineSeconds % 3600) / 60);
                const s = onlineSeconds % 60;
                timerEl.textContent =
                    `⏱️ 已在线 ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            }, 1000);
        }

        // ==================== 页面导航 ====================
        function navigateTo(page, silent = false) {
            if (!silent) triggerGlitch();
            currentPage = page;
            document.getElementById('homeView').style.display = page === 'home' ? 'block' : 'none';
            document.getElementById('categoryView').style.display = page === 'category' ? 'block' : 'none';
            document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
            const targetLink = document.querySelector(`.nav-links a[data-page="${page}"]`);
            if (targetLink) targetLink.classList.add('active');
            document.getElementById('navLinks').classList.remove('open');
            document.getElementById('hamburgerBtn').classList.remove('open');
            if (page === 'home') renderHome();
            if (page === 'category') renderCategory();
            if (!silent) {
                setHash(page);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function triggerGlitch() {
            const main = document.getElementById('mainContent');
            main.classList.remove('glitching');
            void main.offsetWidth;
            main.classList.add('glitching');
            setTimeout(() => main.classList.remove('glitching'), 400);
        }

        // ==================== 首页 ====================
        function renderHome() {
            renderBanner();
            renderFeatured();
        }
        function renderBanner() {
            const bannerSection = document.getElementById('bannerSection');
            const featured = gamesData.filter(g => g.featured);
            if (featured.length === 0) {
                bannerSection.innerHTML =
                    '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-secondary);">暂无推荐</div>';
                return;
            }
            currentBannerIndex = Math.min(currentBannerIndex, featured.length - 1);
            let slidesHTML = '';
            featured.forEach((game, i) => {
                const bg = game.bannerBg || game.cover;
                slidesHTML += `
                    <div class="banner-slide ${i === currentBannerIndex ? 'active' : ''}" onclick="openGameDetail(${game.id})">
                        <div class="banner-bg" style="background-image:url('${bg}');"></div>
                        <div class="banner-overlay"></div>
                        <div class="banner-info">
                            <span class="banner-tag">🔥 推荐</span>
                            <h2>${game.title}</h2>
                            <p>${game.description.substring(0, 60)}...</p>
                        </div>
                    </div>`;
            });
            let dotsHTML = '';
            featured.forEach((_, i) => dotsHTML +=
                `<span class="${i === currentBannerIndex ? 'active' : ''}" onclick="goToBanner(${i})"></span>`);
            bannerSection.innerHTML = `
                <div class="banner-arrow left" onclick="changeBanner(-1)">◀</div>
                <div class="banner-arrow right" onclick="changeBanner(1)">▶</div>
                <div class="banner-dots" id="bannerDots">${dotsHTML}</div>
                ${slidesHTML}`;
        }
        function changeBanner(dir) {
            const featured = gamesData.filter(g => g.featured);
            if (featured.length === 0) return;
            currentBannerIndex = (currentBannerIndex + dir + featured.length) % featured.length;
            updateBannerDisplay(featured);
            resetBannerAutoplay();
        }
        function goToBanner(index) {
            const featured = gamesData.filter(g => g.featured);
            if (featured.length === 0) return;
            currentBannerIndex = index;
            updateBannerDisplay(featured);
            resetBannerAutoplay();
        }
        function updateBannerDisplay(featured) {
            document.querySelectorAll('.banner-slide').forEach((s, i) => s.classList.toggle('active', i ===
                currentBannerIndex));
            document.querySelectorAll('#bannerDots span').forEach((d, i) => d.classList.toggle('active', i ===
                currentBannerIndex));
        }
        function startBannerAutoplay() { bannerInterval = setInterval(() => changeBanner(1), 5000); }

        function resetBannerAutoplay() { clearInterval(bannerInterval);
            startBannerAutoplay(); }

        function renderFeatured() {
            const grid = document.getElementById('featuredGrid');
            const featured = gamesData.filter(g => g.featured);
            const display = featured.length >= 8 ? featured : [...featured, ...gamesData.filter(g => !g.featured)].slice(0,
            8);
            grid.innerHTML = display.map(g => createGameCard(g)).join('');
        }

        // ==================== 分类页 ====================
        function renderCategory() {
            const grid = document.getElementById('categoryGrid');
            const noRes = document.getElementById('noResults');
            let filtered = gamesData;
            if (currentFilter === 'PC') filtered = gamesData.filter(g => g.platforms?.some(p => p.type === 'PC'));
            else if (currentFilter === 'Android') filtered = gamesData.filter(g => g.platforms?.some(p => p.type ===
                'Android'));
            else if (currentFilter === 'krkr') filtered = gamesData.filter(g => g.platforms?.some(p => p.sub === 'krkr'));
            else if (currentFilter === 'Ty') filtered = gamesData.filter(g => g.platforms?.some(p => p.sub === 'Ty'));
            else if (currentFilter === 'ONS') filtered = gamesData.filter(g => g.platforms?.some(p => p.sub === 'ONS'));
            else if (currentFilter === 'android_direct') filtered = gamesData.filter(g => g.platforms?.some(p => p.sub ===
                'android_direct'));
            else if (currentFilter === 'chinese') filtered = gamesData.filter(g => g.isChinese);
            if (filtered.length === 0) { grid.innerHTML = '';
                noRes.style.display = 'block'; } else { noRes.style.display = 'none';
                grid.innerHTML = filtered.map(g => createGameCard(g)).join(''); }
        }
        function setFilter(filter, btn) {
            currentFilter = filter;
            document.querySelectorAll('#filterSection .filter-btn').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
            triggerGlitch();
            renderCategory();
        }

        function handleSearch(query) {
            if (!query.trim()) {
                if (currentPage === 'home') renderHome();
                if (currentPage === 'category') renderCategory();
                return;
            }
            const q = query.toLowerCase();
            const results = gamesData.filter(g =>
                g.title.toLowerCase().includes(q) ||
                g.tags.some(t => t.toLowerCase().includes(q)) ||
                (g.platforms && g.platforms.some(p => p.type.toLowerCase().includes(q) || (p.sub && p.sub.toLowerCase()
                    .includes(q)))) ||
                g.description.toLowerCase().includes(q)
            );
            document.getElementById('homeView').style.display = 'block';
            document.getElementById('categoryView').style.display = 'none';
            document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
            document.querySelector('.nav-links a[data-page="home"]')?.classList.add('active');
            currentPage = 'home';
            document.getElementById('bannerSection').style.display = 'none';
            const grid = document.getElementById('featuredGrid');
            grid.innerHTML = results.length ? results.map(g => createGameCard(g)).join('') :
                '<div style="grid-column:1/-1;text-align:center;padding:40px;">😿 没有找到相关游戏</div>';
        }

        // ==================== 游戏详情（含预览图、点赞、评论） ====================
        function openGameDetail(gameId) {
            const game = gamesData.find(g => g.id === gameId);
            if (!game) return;
            const modal = document.getElementById('modalOverlay');
            const body = document.getElementById('modalBody');
            const likeSection = document.getElementById('likeSection');
            const commentSection = document.getElementById('commentSection');

            const platformList = ['PC', 'krkr', 'Ty', 'ONS', 'android_direct'];
            const names = { PC: '💻 PC版', krkr: '📱 krkr', Ty: '📱 Tyranor', ONS: '📱 ONS', android_direct: '📱 安卓直装' };
            const keys = { PC: 'PC', krkr: 'krkr', Ty: 'Ty', ONS: 'ONS', android_direct: 'android_direct' };

            let dlButtons = '';
            platformList.forEach(key => {
                const hasPlatform = game.platforms?.some(p => {
                    if (key === 'PC') return p.type === 'PC';
                    if (key === 'android_direct') return p.sub === 'android_direct';
                    return p.sub === key;
                });
                const url = game.downloads?.[keys[key]];
                let cls = 'btn-dl';
                let text = names[key];
                let onclick = '';
                let disabled = false;
                if (!hasPlatform) { cls += ' disabled';
                    text += ' (暂无资源)';
                    disabled = true; } else if (url) { text += ' (点击下载)';
                    onclick = `simulateDownload('${key}','${game.title}','${url}')`; } else { cls += ' pending';
                    text += ' (链接待添加)'; }
                dlButtons +=
                    `<button class="${cls}" ${onclick ? `onclick="${onclick}"` : ''} ${disabled ? 'disabled' : ''}>${text}</button>`;
            });

            // 预览图
            let previewHTML = '';
            if (game.previewImages && game.previewImages.length > 0) {
                previewHTML = '<div class="preview-row">' + game.previewImages.map(url =>
                    `<img src="${url}" alt="预览" onerror="this.style.display='none'" loading="lazy">`).join('') +
                    '</div>';
            }

            body.innerHTML = `
                <div class="modal-cover-wrap">
                    <img src="${game.cover}" alt="${game.title}" onerror="this.src='https://placehold.co/300x400/1a1535/b347ea?text=${encodeURIComponent(game.title.substring(0,4))}'">
                </div>
                <div class="modal-info">
                    <h2>${game.title}</h2>
                    <div class="modal-tags-row">${getModalTagsHTML(game)}</div>
                    <div class="modal-description">${game.description}</div>
                    ${previewHTML}
                    <div class="modal-dl-section">${dlButtons}</div>
                </div>`;

            // 点赞区
            const likeCount = getLikeCount(gameId);
            const liked = isLikedByUser(gameId);
            likeSection.innerHTML = `
                <button class="like-btn ${liked ? 'liked' : ''}" onclick="toggleLike(${gameId})">❤️ ${liked ? '已赞' : '点赞'}</button>
                <span class="like-count">${likeCount} 人点赞</span>`;

            // 评论区（加载已有评论）
            const comments = getComments(gameId);
            let commentsHTML = comments.map(c => `
                <div class="comment-item">
                    <div class="c-user">${escapeHtml(c.name)} <span class="c-time">${new Date(c.time).toLocaleString()}</span></div>
                    <div class="c-text">${escapeHtml(c.text)}</div>
                </div>`).join('');
            commentSection.innerHTML = `
                <h3>💬 玩家评论 (${comments.length})</h3>
                <div id="commentsList">${commentsHTML || '<div style="color:var(--text-secondary);">暂无评论，来第一个评论吧~</div>'}</div>
                <div class="comment-input-row">
                    <input type="text" id="commentName" placeholder="你的名字">
                    <input type="text" id="commentText" placeholder="写下你的评论...">
                    <button onclick="submitComment(${gameId})">发送 ✨</button>
                </div>`;

            modal.classList.add('open');
            document.body.style.overflow = 'hidden';
            setHash(`detail/${gameId}`);
        }

        function getModalTagsHTML(game) {
            let html = '';
            game.platforms?.forEach(p => {
                const pl = getPlatformLabel(p);
                html +=
                    `<span class="modal-tag" style="background:rgba(91,106,240,0.2);color:#8fa4ff;">${pl.text}</span>`;
            });
            if (game.isChinese) html +=
                '<span class="modal-tag" style="background:rgba(126,207,138,0.2);color:#8ff0a0;">✅ 汉化</span>';
            game.tags?.forEach(t => html +=
                '<span class="modal-tag" style="background:rgba(255,255,255,0.04);color:#ccc;">' + t + '</span>');
            return html;
        }

        function escapeHtml(text) {
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function toggleLike(gameId) {
            const liked = isLikedByUser(gameId);
            const count = getLikeCount(gameId);
            if (liked) {
                setUserLiked(gameId, false);
                setLikeCount(gameId, Math.max(0, count - 1));
            } else {
                setUserLiked(gameId, true);
                setLikeCount(gameId, count + 1);
            }
            // 刷新点赞区
            const newCount = getLikeCount(gameId);
            const newLiked = isLikedByUser(gameId);
            document.querySelector('.like-btn').className = `like-btn ${newLiked ? 'liked' : ''}`;
            document.querySelector('.like-btn').innerHTML = `❤️ ${newLiked ? '已赞' : '点赞'}`;
            document.querySelector('.like-count').textContent = `${newCount} 人点赞`;
        }

        function submitComment(gameId) {
            const nameInput = document.getElementById('commentName');
            const textInput = document.getElementById('commentText');
            const name = nameInput.value.trim();
            const text = textInput.value.trim();
            if (!name || !text) return;
            const comments = addComment(gameId, name, text);
            const list = document.getElementById('commentsList');
            const commentsHTML = comments.map(c => `
                <div class="comment-item">
                    <div class="c-user">${escapeHtml(c.name)} <span class="c-time">${new Date(c.time).toLocaleString()}</span></div>
                    <div class="c-text">${escapeHtml(c.text)}</div>
                </div>`).join('');
            list.innerHTML = commentsHTML;
            textInput.value = '';
            // 更新评论数
            document.querySelector('.comment-section h3').textContent = `💬 玩家评论 (${comments.length})`;
        }

        function simulateDownload(platform, title, url) {
            const messages = {
                PC: '请使用电脑浏览器打开下载链接，推荐使用IDM加速。',
                krkr: '请将游戏文件放入手机存储的krkr模拟器对应目录。',
                Ty: '使用Tyranor模拟器打开游戏。',
                ONS: '将游戏文件夹放入ONS模拟器的游戏目录。',
                android_direct: '安卓直装版，下载后直接安装APK即可。'
            };
            const toast = document.createElement('div');
            toast.style.cssText = `
                position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;
                background:rgba(20,16,35,0.95);border:1px solid var(--neon-purple);
                color:#fff;padding:16px 28px;border-radius:20px;font-weight:500;
                box-shadow:0 0 30px rgba(179,71,234,0.7);backdrop-filter:blur(12px);
                animation:toastIn 0.4s ease, toastOut 0.4s ease 2.5s forwards;
                max-width:90vw;text-align:center;
            `;
            toast.innerHTML = `
                <div style="margin-bottom:6px;">📥 正在跳转下载「${title}」</div>
                <div style="font-size:0.8rem;color:#ccc;">${messages[platform]}</div>
                <div style="font-size:0.75rem;margin-top:6px;color:var(--neon-cyan);">资源来源：NekoGalgame琉璃资源库</div>`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
            if (url && url.startsWith('http')) window.open(url, '_blank');
        }

        function closeModal(e) { if (e.target === document.getElementById('modalOverlay')) closeModalDirect(); }

        function closeModalDirect() {
            document.getElementById('modalOverlay').classList.remove('open');
            document.body.style.overflow = '';
            setHash('home'); // 返回首页hash
        }

        // ==================== 其他 ====================
        function toggleMobileMenu() {
            document.getElementById('navLinks').classList.toggle('open');
            document.getElementById('hamburgerBtn').classList.toggle('open');
        }
        function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }

        function handleScroll() {
            const btn = document.getElementById('btnBackTop');
            const nav = document.getElementById('navBar');
            btn.classList.toggle('visible', window.scrollY > 400);
            nav.classList.toggle('scrolled', window.scrollY > 40);
        }

        document.addEventListener('DOMContentLoaded', () => {
            window.addEventListener('scroll', handleScroll);
            window.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && document.getElementById('modalOverlay').classList.contains('open'))
                    closeModalDirect();
                if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                    e.preventDefault();
                    document.getElementById('searchInput').focus();
                }
            });
            initBootSequence();
        });

        // 全局暴露
        window.navigateTo = navigateTo;
        window.changeBanner = changeBanner;
        window.goToBanner = goToBanner;
        window.openGameDetail = openGameDetail;
        window.closeModal = closeModal;
        window.closeModalDirect = closeModalDirect;
        window.setFilter = setFilter;
        window.handleSearch = handleSearch;
        window.toggleMobileMenu = toggleMobileMenu;
        window.scrollToTop = scrollToTop;
        window.simulateDownload = simulateDownload;
        window.toggleLike = toggleLike;
        window.submitComment = submitComment;
    </script>
</body>
</html>
