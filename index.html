<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galfang · 佐久真纺</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/Care0721/Fanggal/master/Lain.png">
    <meta property="og:title" content="Galfang 佐久真诗">
    <meta property="og:description" content="发现更多Galgame资源，纯粹、简洁、高速。">
    <meta property="og:image" content="https://raw.githubusercontent.com/Care0721/Fanggal/master/Lain.png">
    <meta property="og:url" content="https://care0721.github.io/Fanggal">
    <meta property="og:type" content="website">
    <style>
        :root {
            --bg: #f9f9fb; --card: rgba(255,255,255,0.9); --nav-bg: rgba(255,255,255,0.85);
            --text: #1e1e28; --text-light: #6b6b7a; --border: rgba(0,0,0,0.05);
            --primary: #4f6d8a; --pink: #c48b95; --green: #6d8f7e;
            --shadow: 0 4px 16px rgba(0,0,0,0.02);
            --shadow-hover: 0 8px 24px rgba(0,0,0,0.06);
            --radius: 16px; --radius-sm: 12px;
            --transition: 0.25s cubic-bezier(0.25, 0.8, 0.25, 1.2);
        }
        body.dark {
            --bg: #101018; --card: rgba(24,24,34,0.95); --nav-bg: rgba(16,16,24,0.85);
            --text: #eaeaf0; --text-light: #88889a; --border: rgba(255,255,255,0.05);
            --primary: #7fa0ba; --pink: #dba5af; --green: #87a893;
            --shadow: 0 4px 16px rgba(0,0,0,0.3);
            --shadow-hover: 0 8px 24px rgba(0,0,0,0.4);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior:smooth; font-size:16px; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Hiragino Sans','Yu Gothic','Noto Sans JP','Microsoft YaHei', sans-serif;
            min-height:100vh; overflow-x:hidden; line-height:1.5;
            transition: background 0.4s, color 0.4s;
            -webkit-font-smoothing: antialiased;
        }
        *:focus { outline: none; }
        button, input, textarea { outline: none; }
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 12px 28px; border-radius: 30px; border: 1px solid var(--border);
            background: var(--card); backdrop-filter: blur(12px);
            color: var(--text); font-weight: 500; font-size: 0.9rem;
            letter-spacing: -0.01em; cursor: pointer; transition: all var(--transition);
            box-shadow: var(--shadow); font-family: inherit; white-space: nowrap;
        }
        .btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-hover); border-color: var(--primary); }
        .btn:active { transform: scale(0.98); }
        .btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
        .btn.pink { border-color: var(--pink); color: var(--pink); }
        .btn.pink:hover { background: var(--pink); color: #fff; }
        .btn.green { border-color: var(--green); color: var(--green); }
        .btn.disabled { opacity: 0.4; pointer-events: none; }

        .nav-bar {
            position: sticky; top:0; z-index:50; background: var(--nav-bg);
            backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
            padding: 0 32px; height: 70px; display: flex; align-items: center;
            justify-content: space-between; transition: background 0.4s, box-shadow 0.4s;
        }
        .nav-bar.scrolled { background: var(--nav-bg); box-shadow: 0 2px 20px rgba(0,0,0,0.04); }
        .nav-logo { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; cursor: pointer;
            background: linear-gradient(135deg, var(--primary), var(--pink));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-links { display: flex; gap: 8px; list-style: none; }
        .nav-links .btn { background: transparent; box-shadow: none; border: none; padding: 8px 18px; }
        .nav-links .btn.active { background: rgba(79,109,138,0.08); color: var(--primary); }
        .menu-toggle { display: none; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text); }
        @media (max-width: 768px) {
            .nav-links { position: fixed; top:70px; left:0; right:0; background: var(--nav-bg);
                flex-direction: column; padding: 20px; display: none; z-index:40; }
            .nav-links.open { display: flex; }
            .menu-toggle { display: block; }
        }
        .search-box { position: relative; display: flex; align-items: center; background: var(--card);
            border: 1px solid var(--border); border-radius: 30px; padding: 8px 20px; cursor: pointer; }
        .search-box input { background: transparent; border: none; color: var(--text);
            font-size: 0.9rem; width: 160px; pointer-events: none; }

        .search-overlay {
            position: fixed; top:0; left:0; right:0; bottom:0; z-index:60;
            background: var(--bg); display: none; flex-direction: column;
            animation: fadeIn 0.2s ease;
        }
        .search-overlay.active { display: flex; }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        .search-header {
            display: flex; align-items: center; padding: 20px 24px;
            background: var(--nav-bg); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .search-header input {
            flex:1; background: var(--card); border: 1px solid var(--border);
            border-radius: 30px; padding: 14px 24px; font-size: 1.1rem;
            color: var(--text); font-family: inherit; margin: 0 16px;
        }
        .search-header button {
            background: none; border: none; color: var(--text); font-size: 1.2rem;
            cursor: pointer; padding: 8px; transition: color 0.2s;
        }
        .search-header button:hover { color: var(--primary); }
        .search-body {
            flex:1; overflow-y: auto; padding: 24px; max-width: 1320px;
            width: 100%; margin: 0 auto;
        }

        .main-content { padding: 32px; max-width: 1320px; margin: 0 auto; }
        .hero {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 28px; padding: 64px 48px; margin-bottom: 40px;
            position: relative; overflow: hidden;
        }
        .hero::after {
            content: ''; position: absolute; top: -30%; right: -10%; width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(79,109,138,0.06) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none;
        }
        .hero h1 { font-size: 2.8rem; font-weight: 700; letter-spacing: -0.03em; line-height: 1.2; margin-bottom: 12px; }
        .hero p { font-size: 1.1rem; color: var(--text-light); margin-bottom: 28px; max-width: 480px; letter-spacing: -0.01em; }
        .hero-btns { display: flex; gap: 16px; flex-wrap: wrap; }
        @media (max-width: 600px) { .hero { padding: 40px 28px; } .hero h1 { font-size: 2rem; } }

        .section-title { font-size: 1.2rem; font-weight: 600; margin: 0 0 20px; display: flex; align-items: center; gap: 10px; letter-spacing: -0.02em; }
        .section-title::before { content: ''; width: 4px; height: 20px; background: linear-gradient(180deg, var(--primary), var(--pink)); border-radius: 2px; }

        .scroll-cards { display: flex; gap: 18px; overflow-x: auto; padding-bottom: 16px; scroll-snap-type: x mandatory; margin-bottom: 40px; }
        .scroll-cards::-webkit-scrollbar { height: 4px; }
        .scroll-cards::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 24px; margin-bottom: 40px; }
        @media (max-width: 600px) { .game-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; } }
        .game-card {
            background: var(--card); border-radius: var(--radius); overflow: hidden;
            cursor: pointer; border: 1px solid var(--border); transition: all var(--transition);
            box-shadow: var(--shadow);
        }
        .game-card:hover { transform: translateY(-4px); border-color: var(--primary); box-shadow: var(--shadow-hover); }
        .card-cover { width: 100%; aspect-ratio: 3/4; object-fit: cover; display: block; }
        .card-body { padding: 16px; }
        .card-title { font-weight: 600; font-size: 0.95rem; margin-bottom: 8px; letter-spacing: -0.01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .tag { font-size: 0.7rem; padding: 4px 10px; border-radius: 10px; background: rgba(79,109,138,0.08); color: var(--primary); white-space: nowrap; font-weight: 500; }
        .tag.hot { background: rgba(196,139,149,0.08); color: var(--pink); }

        .filter-section { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 28px; }
        .filter-btn { padding: 10px 20px; border-radius: 24px; border: 1px solid var(--border); background: var(--card); color: var(--text-light); cursor: pointer; font-size: 0.85rem; transition: all var(--transition); font-weight: 500; }
        .filter-btn.active { background: rgba(79,109,138,0.1); color: var(--primary); border-color: var(--primary); }

        .modal-overlay { position: fixed; inset:0; z-index:200; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; opacity:0; visibility:hidden; transition:0.25s; }
        .modal-overlay.open { opacity:1; visibility:visible; }
        .modal-dialog { background: var(--card); border-radius: var(--radius); padding: 32px; max-width: 800px; width: 92%; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.1); transform: scale(0.96); transition: transform var(--transition); }
        .modal-overlay.open .modal-dialog { transform: scale(1); }
        .modal-body { display: flex; gap: 28px; flex-wrap: wrap; }
        .modal-cover img { width: 190px; border-radius: var(--radius-sm); }
        @media (max-width:600px) { .modal-body { flex-direction: column; align-items: center; } .modal-cover img { width: 140px; } }
        .preview-row { display: flex; gap: 12px; flex-wrap: wrap; margin: 16px 0; }
        .preview-row img { width: 88px; height: 66px; object-fit: cover; border-radius: 10px; cursor: pointer; transition: transform var(--transition); border: 1px solid var(--border); }
        .preview-row img:hover { transform: scale(1.04); border-color: var(--primary); }
        .rating-star { font-size: 1.4rem; color: #d0d0d6; cursor: pointer; transition: 0.15s; }
        .rating-star.filled { color: #f0b050; }
        .comment-item { background: rgba(0,0,0,0.01); border-radius: 14px; padding: 14px; margin-bottom: 12px; border: 1px solid var(--border); }
        .back-top { position: fixed; bottom: 24px; right: 24px; width: 46px; height: 46px; border-radius: 50%; background: var(--primary); color: #fff; border: none; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-hover); cursor: pointer; z-index:30; transition: transform 0.2s; }
        .back-top:hover { transform: translateY(-2px); }
        .img-viewer { position: fixed; inset:0; z-index:300; background: rgba(0,0,0,0.92); display: flex; align-items: center; justify-content: center; opacity:0; visibility:hidden; transition:0.3s; }
        .img-viewer.active { opacity:1; visibility:visible; }
        .img-viewer img { max-width: 90vw; max-height: 90vh; transform: scale(0.95); transition: transform 0.4s; border-radius: 8px; }
        .img-viewer.active img { transform: scale(1); }

        .skeleton { background: linear-gradient(90deg, var(--card) 25%, rgba(0,0,0,0.03) 50%, var(--card) 75%); background-size: 200% 100%; animation: shimmer 1.8s infinite; border-radius: var(--radius); }
        @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
        .skeleton-card { height: 100%; aspect-ratio: 3/4; }

        .category-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 18px; margin-bottom: 36px; }
        .category-item { background: var(--card); border-radius: var(--radius-sm); padding: 24px 12px; text-align: center; border: 1px solid var(--border); cursor: pointer; transition: all var(--transition); }
        .category-item:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: var(--shadow-hover); }
        .category-icon { font-size: 1.8rem; margin-bottom: 8px; }
        .category-name { font-size: 0.85rem; font-weight: 500; }

        .site-footer { text-align:center; margin-top:40px; padding:20px 0; color:var(--text-light); font-size:0.85rem; }
        .site-footer a { color: var(--primary); text-decoration: none; font-weight: 500; }
        .site-footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div id="appContainer">
        <nav class="nav-bar" id="navBar">
            <div class="nav-logo" onclick="navigateTo('home')">Galfang</div>
            <ul class="nav-links" id="navLinks">
                <li><button class="btn active" onclick="navigateTo('home')" data-page="home">首页</button></li>
                <li><button class="btn" onclick="navigateTo('category')" data-page="category">分类浏览</button></li>
                <li><button class="btn green" onclick="randomGame()">随机推荐</button></li>
            </ul>
            <div style="display:flex; gap:16px; align-items:center;">
                <div class="search-box" id="searchBoxTrigger" onclick="openSearchView()">
                    <span>🔍</span>
                    <input type="text" placeholder="搜索游戏…" readonly>
                </div>
                <button class="btn" id="themeToggle" onclick="toggleTheme()" style="background:transparent; border:1px solid var(--border);">◑</button>
                <button class="menu-toggle" onclick="document.getElementById('navLinks').classList.toggle('open')">≡</button>
            </div>
        </nav>

        <div class="search-overlay" id="searchOverlay">
            <div class="search-header">
                <button onclick="closeSearchView()">← 返回</button>
                <input type="text" id="searchViewInput" placeholder="搜索游戏名称、标签…" autofocus>
                <button id="searchViewClear" style="display:none;">✕</button>
            </div>
            <div class="search-body">
                <div id="searchViewResults" class="game-grid"></div>
                <div id="searchViewStatus" style="text-align:center; padding:40px; color:var(--text-light);">
                    输入关键词开始搜索
                </div>
            </div>
        </div>

        <div class="main-content">
            <div id="homeView">
                <div class="hero">
                    <h1>欢迎光临 Fanggal</h1>
                    <p>ずっと前に君を愛していた</p>
                    <div class="hero-btns">
                        <button class="btn primary" onclick="navigateTo('category')">浏览分类</button>
                        <button class="btn pink" onclick="randomGame()">随机推荐</button>
                    </div>
                </div>
                <div class="section-title">今日推荐</div>
                <div class="scroll-cards" id="dailyScroll"></div>
                <div class="section-title">分类入口</div>
                <div class="category-grid" id="categoryEntries"></div>
                <div class="section-title">精选推荐</div>
                <div class="game-grid" id="featuredGrid">
                    <div class="skeleton skeleton-card"></div>
                    <div class="skeleton skeleton-card"></div>
                    <div class="skeleton skeleton-card"></div>
                    <div class="skeleton skeleton-card"></div>
                </div>
            </div>
            <div id="categoryView" style="display:none;">
                <div class="section-title">全部作品</div>
                <div class="filter-section" id="filterSection"></div>
                <div class="game-grid" id="categoryGrid"></div>
                <div id="noResults" style="display:none; text-align:center; padding:40px; color:var(--text-light);">暂时没有游戏，试试其他分类吧～</div>
            </div>
            <div class="site-footer">
                <div id="uptimeDisplay">本站已运营 0 天 00:00:00</div>
                <div style="margin-top:6px;">联系站长：<a href="mailto:carenb666@foxmail.com">carenb666@foxmail.com</a></div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
        <div class="modal-dialog" onclick="event.stopPropagation()">
            <button class="btn" onclick="closeModal()" style="float:right; background:transparent;">✕</button>
            <div class="modal-body" id="modalBody"></div>
            <div id="likeSection" style="margin-top:20px;"></div>
            <div id="ratingSection" style="margin-top:14px;"></div>
            <div id="commentSection" style="margin-top:24px;"></div>
        </div>
    </div>

    <div class="img-viewer" id="imgViewer" onclick="this.classList.remove('active')">
        <img id="imgViewerImg" src="">
    </div>
    <button class="back-top" id="backTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

    <script>
        (function() {
            const API_BASE = 'https://galgame-api.fanggal.workers.dev';
            const userId = (() => { let id = localStorage.getItem('gl_userId'); if (!id) { id = 'u_' + Date.now(); localStorage.setItem('gl_userId', id); } return id; })();
            const COMMON_TAGS = ['纯爱','剧情','奇幻','科幻','和风','治愈','悬疑','青春','校园','恋爱','后宫','搞笑','战斗','萝莉','催泪','重口','全年龄'];
            let gamesData = [];
            let currentPage = 'home', currentFilter = 'all';

            // 工具函数
            function createCard(game) {
                let tags = (game.tags||[]).slice(0,3).map(t => `<span class="tag">${t}</span>`).join('');
                if (game.isChinese) tags += '<span class="tag hot">汉化</span>';
                return `<div class="game-card" onclick="openGameDetail(${game.id})">
                    <img class="card-cover" src="${game.cover}" loading="lazy" onerror="this.style.background='var(--card)'">
                    <div class="card-body"><div class="card-title">${game.title}</div><div class="card-tags">${tags}</div></div>
                </div>`;
            }
            function getTodaySeed() {
                const now = new Date(); return now.getFullYear()*10000 + (now.getMonth()+1)*100 + now.getDate();
            }

            // 随机推荐
            window.randomGame = function() {
                if (!gamesData.length) { alert('游戏列表尚未加载，请稍后再试。'); return; }
                const idx = Math.floor(Math.random() * gamesData.length);
                openGameDetail(gamesData[idx].id);
            };

            // 导航
            window.navigateTo = function(page) {
                if (currentPage === page) return;
                currentPage = page;
                document.getElementById('homeView').style.display = (page==='home')?'block':'none';
                document.getElementById('categoryView').style.display = (page==='category')?'block':'none';
                document.querySelectorAll('.nav-links .btn').forEach(b => b.classList.remove('active'));
                const activeBtn = document.querySelector(`.nav-links .btn[data-page="${page}"]`);
                if (activeBtn) activeBtn.classList.add('active');
                if (page === 'home') renderHome();
                if (page === 'category') renderCategory();
                window.location.hash = page;
            };
            window.goToTag = (tag) => { currentFilter = tag; navigateTo('category'); };
            window.setFilter = (f) => { currentFilter = f; renderCategory(); };

            function renderHome() {
                if (!gamesData.length) {
                    document.getElementById('featuredGrid').innerHTML = '<div style="text-align:center;padding:40px;">暂无数据</div>';
                    return;
                }
                const todaySeed = getTodaySeed();
                const todayGame = gamesData[todaySeed % gamesData.length];
                document.getElementById('dailyScroll').innerHTML = todayGame ? `<div style="flex:0 0 200px; scroll-snap-align:start;">${createCard(todayGame)}</div>` : '';
                const catEntries = COMMON_TAGS.map(tag => `<div class="category-item" onclick="goToTag('${tag}')"><div class="category-icon">·</div><div class="category-name">${tag}</div></div>`).join('');
                document.getElementById('categoryEntries').innerHTML = catEntries;
                const featured = gamesData.filter(g => g.featured);
                document.getElementById('featuredGrid').innerHTML = (featured.length ? featured : gamesData.slice(0,8)).map(g => createCard(g)).join('');
            }

            function renderCategory() {
                let filtered = gamesData;
                if (currentFilter !== 'all') {
                    if (['PC','Android','krkr','Ty','ONS','android_direct'].includes(currentFilter))
                        filtered = gamesData.filter(g => g.platforms?.some(p => p.type===currentFilter || p.sub===currentFilter));
                    else if (currentFilter === 'chinese') filtered = gamesData.filter(g => g.isChinese);
                    else filtered = gamesData.filter(g => g.tags?.includes(currentFilter));
                }
                document.getElementById('categoryGrid').innerHTML = filtered.map(g => createCard(g)).join('');
                document.getElementById('noResults').style.display = filtered.length ? 'none' : 'block';
                const filters = ['all','PC','Android','krkr','Ty','ONS','android_direct','chinese',...COMMON_TAGS];
                document.getElementById('filterSection').innerHTML = filters.map(f => {
                    let label = f; if (f==='android_direct') label='安卓直装'; if (f==='chinese') label='汉化';
                    return `<button class="filter-btn ${currentFilter===f?'active':''}" onclick="setFilter('${f}')">${label}</button>`;
                }).join('');
            }

            // 搜索界面
            const searchOverlay = document.getElementById('searchOverlay');
            const searchViewInput = document.getElementById('searchViewInput');
            const searchViewClear = document.getElementById('searchViewClear');
            const searchViewResults = document.getElementById('searchViewResults');
            const searchViewStatus = document.getElementById('searchViewStatus');
            let searchHistory = JSON.parse(localStorage.getItem('searchHistory') || '[]');

            window.openSearchView = function() {
                searchOverlay.classList.add('active');
                document.body.style.overflow = 'hidden';
                searchViewInput.value = '';
                searchViewClear.style.display = 'none';
                searchViewResults.innerHTML = '';
                searchViewStatus.textContent = '输入关键词开始搜索';
                searchViewStatus.style.display = 'block';
                setTimeout(() => searchViewInput.focus(), 100);
            };
            window.closeSearchView = function() {
                searchOverlay.classList.remove('active');
                document.body.style.overflow = '';
            };

            searchViewInput.addEventListener('input', function() {
                const term = this.value.trim();
                searchViewClear.style.display = term ? 'block' : 'none';
                if (term) {
                    if (!searchHistory.includes(term)) {
                        searchHistory.unshift(term);
                        if (searchHistory.length > 10) searchHistory.pop();
                        localStorage.setItem('searchHistory', JSON.stringify(searchHistory));
                    }
                    const results = gamesData.filter(g =>
                        g.title.toLowerCase().includes(term.toLowerCase()) ||
                        g.tags?.some(t => t.toLowerCase().includes(term.toLowerCase())) ||
                        (g.description && g.description.toLowerCase().includes(term.toLowerCase()))
                    );
                    searchViewResults.innerHTML = results.length ? results.map(g => createCard(g)).join('') : '';
                    searchViewStatus.style.display = 'block';
                    searchViewStatus.textContent = results.length ? `找到 ${results.length} 个游戏` : '未找到相关游戏';
                } else {
                    searchViewResults.innerHTML = '';
                    searchViewStatus.textContent = '输入关键词开始搜索';
                    searchViewStatus.style.display = 'block';
                }
            });
            searchViewClear.addEventListener('click', () => {
                searchViewInput.value = '';
                searchViewClear.style.display = 'none';
                searchViewResults.innerHTML = '';
                searchViewStatus.textContent = '输入关键词开始搜索';
                searchViewStatus.style.display = 'block';
                searchViewInput.focus();
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && searchOverlay.classList.contains('active')) {
                    closeSearchView();
                }
            });

            // 详情弹窗
            window.openGameDetail = async function(id) {
                const game = gamesData.find(g => g.id == id); if (!game) return;
                if (searchOverlay.classList.contains('active')) closeSearchView();
                const modal = document.getElementById('modalOverlay');
                modal.classList.add('open');
                document.getElementById('modalBody').innerHTML = `<div style="text-align:center; padding:40px;">加载中…</div>`;
                const [likeRes, ratingRes, comments] = await Promise.all([
                    fetch(`${API_BASE}/api/likes/${id}?userId=${userId}`).then(r=>r.json()),
                    fetch(`${API_BASE}/api/ratings/${id}?userId=${userId}`).then(r=>r.json()),
                    fetch(`${API_BASE}/api/comments/${id}`).then(r=>r.json())
                ]);
                document.getElementById('modalBody').innerHTML = `
                    <div class="modal-cover"><img src="${game.cover}" onerror="this.style.background='var(--card)'"></div>
                    <div style="flex:1;">
                        <h2>${game.title}</h2>
                        <div class="card-tags">${(game.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
                        <p style="margin-top:16px;">${game.description||''}</p>
                        ${game.previewImages?.length ? `<div class="preview-row">${game.previewImages.map(img => `<img src="${img}" onclick="openImageViewer('${img}')">`).join('')}</div>` : ''}
                        <div style="display:flex; flex-wrap:wrap; gap:8px; margin-top:20px;">
                            ${['PC','krkr','Ty','ONS','android_direct'].map(k => {
                                const has = game.platforms?.some(p => (k==='PC'?p.type==='PC':p.sub===k));
                                const dl = game.downloads?.[k] || {};
                                if (!has) return `<button class="btn disabled">${k} (无资源)</button>`;
                                if (dl.url) return `<button class="btn primary" data-url="${dl.url}" data-source="${dl.source||''}" data-instructions="${dl.instructions||''}" onclick="confirmDownload(this)">${k} | ${dl.source||''}</button>`;
                                return `<button class="btn disabled">${k} (待添加)</button>`;
                            }).join('')}
                        </div>
                    </div>`;
                document.getElementById('likeSection').innerHTML = `<button class="btn pink ${likeRes.liked?'liked':''}" onclick="toggleLike(${id})">♥ ${likeRes.liked?'已赞':'点赞'}</button><span style="margin-left:12px; font-size:0.9rem; color:var(--text-light);">${likeRes.count} 人赞过</span>`;
                let stars = ''; for (let i=1;i<=5;i++) stars += `<span class="rating-star ${i<=ratingRes.myRating?'filled':''}" onclick="submitRating(${id},${i})">★</span>`;
                document.getElementById('ratingSection').innerHTML = `<span style="font-size:0.9rem; color:var(--text-light);">评分 · </span><span style="display:inline-flex; gap:4px;">${stars}</span><span style="margin-left:8px; font-size:0.9rem; color:var(--text-light);">${ratingRes.average?.toFixed(1)||'—'} 分</span>`;
                document.getElementById('commentSection').innerHTML = `
                    <h3 style="font-weight:500; margin-bottom:14px;">评论 · ${comments.length}</h3>
                    ${comments.map(c => `<div class="comment-item"><b>${escapeHtml(c.name)}</b> <small style="color:var(--text-light);">${new Date(c.time).toLocaleString()}</small><p style="margin-top:6px;">${escapeHtml(c.text)}</p></div>`).join('')}
                    <div style="display:flex; gap:10px; margin-top:16px;">
                        <input id="cmName" placeholder="名字" style="flex:1; padding:10px; border-radius:24px; border:1px solid var(--border); background:var(--card); color:var(--text);">
                        <input id="cmText" placeholder="写下评论…" style="flex:2; padding:10px; border-radius:24px; border:1px solid var(--border); background:var(--card); color:var(--text);">
                        <button class="btn primary" onclick="submitComment(${id})">发送</button>
                    </div>`;
                window.location.hash = `detail/${id}`;
            };
            function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
            window.openImageViewer = (src) => { const v=document.getElementById('imgViewer'); document.getElementById('imgViewerImg').src=src; v.classList.add('active'); };
            window.confirmDownload = (btn) => {
                const url=btn.dataset.url, source=btn.dataset.source||'未知', ins=btn.dataset.instructions||'';
                const overlay=document.createElement('div'); overlay.style.cssText='position:fixed;inset:0;z-index:999;background:rgba(0,0,0,0.6);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;';
                overlay.innerHTML=`<div style="background:var(--card); border-radius:var(--radius); padding:28px; max-width:380px;"><h3>确认下载</h3><p style="margin:10px 0;">来源 · ${source}</p>${ins?`<p style="margin:10px 0; white-space:pre-wrap;">${ins}</p>`:''}<div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px;"><button class="btn" onclick="this.closest('div').parentElement.remove()">取消</button><button class="btn primary" onclick="window.open('${url}','_blank');this.closest('div').parentElement.remove()">确认下载</button></div></div>`;
                overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();}); document.body.appendChild(overlay);
            };
            window.toggleLike = async (id) => { await fetch(`${API_BASE}/api/likes/${id}`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId})}); openGameDetail(id); };
            window.submitRating = async (id,rating) => { await fetch(`${API_BASE}/api/ratings/${id}`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId,rating})}); openGameDetail(id); };
            window.submitComment = async (id) => { const name=document.getElementById('cmName').value.trim(); const text=document.getElementById('cmText').value.trim(); if(!name||!text)return; await fetch(`${API_BASE}/api/comments/${id}`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,text})}); openGameDetail(id); };
            window.closeModal = () => { document.getElementById('modalOverlay').classList.remove('open'); window.location.hash='home'; };

            // 主题
            window.toggleTheme = () => {
                document.body.classList.toggle('dark');
                const isDark = document.body.classList.contains('dark');
                localStorage.setItem('theme', isDark?'dark':'light');
                document.getElementById('themeToggle').textContent = isDark ? '○' : '◑';
            };
            (function initTheme(){ const t=localStorage.getItem('theme')||'light'; if(t==='dark'){ document.body.classList.add('dark'); document.getElementById('themeToggle').textContent='○'; } })();

            // 运营时间 (硬编码起始日期 2026-05-04)
            (function startUptime() {
                const START_DATE = new Date('2026-05-04T00:00:00'); // 固定起始日
                function update() {
                    const now = new Date();
                    const diff = now - START_DATE;
                    if (diff < 0) {
                        document.getElementById('uptimeDisplay').textContent = '本站尚未开始运营';
                        return;
                    }
                    const totalSec = Math.floor(diff / 1000);
                    const days = Math.floor(totalSec / 86400);
                    const hours = Math.floor((totalSec % 86400) / 3600);
                    const minutes = Math.floor((totalSec % 3600) / 60);
                    const seconds = totalSec % 60;
                    document.getElementById('uptimeDisplay').textContent = `本站已运营 ${days} 天 ${String(hours).padStart(2,'0')}:${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`;
                }
                update();
                setInterval(update, 1000);
            })();

            window.addEventListener('scroll', () => {
                document.getElementById('navBar').classList.toggle('scrolled', window.scrollY > 10);
                document.getElementById('backTop').style.display = window.scrollY > 400 ? 'flex' : 'none';
            });

            // 初始化
            window.addEventListener('load', async () => {
                try { gamesData = await (await fetch(API_BASE + '/api/games')).json(); } catch { gamesData = []; }
                gamesData.forEach(g => { g.downloads = g.downloads || {}; g.previewImages = g.previewImages || []; });
                renderHome();
                renderCategory();
                window.addEventListener('hashchange', () => {
                    const hash = window.location.hash.slice(1);
                    if (hash.startsWith('detail/')) { const id = parseInt(hash.split('/')[1]); if (id) openGameDetail(id); }
                    else if (hash === 'category') navigateTo('category');
                    else navigateTo('home');
                });
                if (window.location.hash === '#category') navigateTo('category');
            });
        })();
    </script>
</body>
</html>
