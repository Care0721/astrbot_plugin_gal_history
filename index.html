<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galfang · 佐久真纺</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/Care0721/Fanggal/master/Lain.png">
    <meta property="og:title" content="Galfang 琉璃资源库">
    <meta property="og:description" content="发现更多Galgame资源，纯粹、简洁、高速。">
    <meta property="og:image" content="https://raw.githubusercontent.com/Care0721/Fanggal/master/Lain.png">
    <meta property="og:url" content="https://care0721.github.io/Fanggal">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        :root {
            --bg: #f8faff; --card: rgba(255,255,255,0.8); --nav-bg: rgba(255,255,255,0.7);
            --text: #2c2c3a; --text-light: #6b6b80; --border: rgba(120,100,160,0.12);
            --primary: #6c8db0; --pink: #e0a0b0; --green: #7ca090;
            --shadow: 0 8px 24px rgba(100,80,130,0.06);
            --shadow-hover: 0 12px 30px rgba(108,141,176,0.18);
            --radius: 18px; --radius-sm: 12px;
            --transition: 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
        }
        body.dark {
            --bg: #12121c; --card: rgba(25,22,38,0.85); --nav-bg: rgba(18,18,28,0.75);
            --text: #e6e4f0; --text-light: #9490a8; --border: rgba(200,180,220,0.12);
            --primary: #8cb4d0; --pink: #e8b8c4; --green: #93b8a6;
            --shadow: 0 8px 24px rgba(0,0,0,0.3);
            --shadow-hover: 0 12px 30px rgba(140,180,208,0.25);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior:smooth; font-size:16px; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'PingFang SC','Microsoft YaHei','Hiragino Sans',sans-serif;
            min-height:100vh; overflow-x:hidden; line-height:1.6;
            transition: background 0.3s, color 0.3s;
            -webkit-font-smoothing: antialiased;
        }
        *:focus { outline: none; }
        button, input, textarea { outline: none; }
        /* 通用按钮 */
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 10px 24px; border-radius: 28px; border: 1px solid transparent;
            background: var(--card); backdrop-filter: blur(10px);
            color: var(--text); font-weight: 600; font-size: 0.9rem;
            cursor: pointer; transition: all var(--transition);
            box-shadow: var(--shadow); font-family: inherit; white-space: nowrap;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); border-color: var(--primary); }
        .btn:active { transform: scale(0.97); }
        .btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
        .btn.pink { border-color: var(--pink); color: var(--pink); }
        .btn.pink:hover { background: var(--pink); color: #fff; }
        .btn.green { border-color: var(--green); color: var(--green); }
        .btn.disabled { opacity: 0.5; pointer-events: none; }

        /* 导航 */
        .nav-bar {
            position: sticky; top:0; z-index:50; background: var(--nav-bg);
            backdrop-filter: blur(16px); border-bottom: 1px solid var(--border);
            padding: 0 24px; height: 64px; display: flex; align-items: center;
            justify-content: space-between; transition: background 0.3s, box-shadow 0.3s;
        }
        .nav-bar.scrolled { background: var(--nav-bg); box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
        .nav-logo { font-size: 1.6rem; font-weight: 800; cursor: pointer;
            background: linear-gradient(135deg, var(--primary), var(--pink));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-links { display: flex; gap: 6px; list-style: none; }
        .nav-links .btn { background: transparent; box-shadow: none; border: none; padding: 8px 16px; }
        .nav-links .btn.active { background: rgba(108,141,176,0.15); color: var(--primary); }
        .menu-toggle { display: none; background: none; border: none; font-size: 1.8rem; cursor: pointer; color: var(--text); }
        @media (max-width: 768px) {
            .nav-links { position: fixed; top:64px; left:0; right:0; background: var(--nav-bg);
                flex-direction: column; padding: 16px; display: none; z-index:40; }
            .nav-links.open { display: flex; }
            .menu-toggle { display: block; }
        }
        .search-box { display: flex; align-items: center; background: var(--card);
            border: 1px solid var(--border); border-radius: 28px; padding: 6px 16px; }
        .search-box input { background: transparent; border: none; color: var(--text);
            font-size: 0.9rem; width: 140px; }
        @media (max-width: 480px) { .search-box input { width: 80px; } }

        /* 主内容 */
        .main-content { padding: 24px; max-width: 1300px; margin: 0 auto; }
        /* Hero */
        .hero {
            background: linear-gradient(135deg, rgba(200,180,220,0.15), rgba(180,200,220,0.15));
            border-radius: 28px; padding: 48px 36px; margin-bottom: 32px;
            position: relative; overflow: hidden;
            border: 1px solid rgba(160,140,200,0.15);
        }
        .hero::before {
            content: ''; position: absolute; top: -50%; right: -20%; width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(200,150,180,0.2) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none;
        }
        .hero h1 { font-size: 2.4rem; font-weight: 800; margin-bottom: 8px; }
        .hero p { font-size: 1.1rem; color: var(--text-light); margin-bottom: 24px; max-width: 500px; }
        .hero-btns { display: flex; gap: 16px; flex-wrap: wrap; }
        @media (max-width: 600px) { .hero { padding: 32px 24px; } .hero h1 { font-size: 1.8rem; } }

        /* 横向滚动 */
        .horizontal-scroll { margin-bottom: 40px; }
        .section-title { font-size: 1.3rem; font-weight: 700; margin: 0 0 16px; display: flex; align-items: center; gap: 10px; }
        .section-title::before { content: ''; width: 4px; height: 24px; background: linear-gradient(180deg, var(--primary), var(--pink)); border-radius: 2px; }
        .scroll-cards { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 12px; scroll-snap-type: x mandatory; }
        .scroll-cards::-webkit-scrollbar { height: 6px; }
        .scroll-cards::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* 卡片网格 */
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; margin-bottom: 40px; }
        @media (max-width: 600px) { .game-grid { grid-template-columns: repeat(2, 1fr); gap: 14px; } }
        .game-card {
            background: var(--card); border-radius: var(--radius); overflow: hidden;
            cursor: pointer; border: 1px solid var(--border); transition: all var(--transition);
            box-shadow: var(--shadow); position: relative;
            backdrop-filter: blur(8px);
        }
        .game-card:hover { transform: translateY(-6px); border-color: var(--primary); box-shadow: var(--shadow-hover); }
        .card-cover { width: 100%; aspect-ratio: 3/4; object-fit: cover; display: block; }
        .card-body { padding: 14px; }
        .card-title { font-weight: 700; font-size: 0.95rem; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
        .tag { font-size: 0.7rem; padding: 3px 10px; border-radius: 12px; background: rgba(108,141,176,0.15); color: var(--primary); white-space: nowrap; }
        .tag.hot { background: rgba(224,160,176,0.15); color: var(--pink); }
        .tag.green { background: rgba(124,160,144,0.15); color: var(--green); }

        /* 筛选 */
        .filter-section { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 24px; }
        .filter-btn { padding: 8px 18px; border-radius: 24px; border: 1px solid var(--border); background: var(--card); color: var(--text-light); cursor: pointer; transition: all var(--transition); }
        .filter-btn.active { background: rgba(108,141,176,0.2); color: var(--primary); border-color: var(--primary); }

        /* 详情弹窗 */
        .modal-overlay { position: fixed; inset:0; z-index:200; background: rgba(0,0,0,0.5); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; opacity:0; visibility:hidden; transition:0.25s; }
        .modal-overlay.open { opacity:1; visibility:visible; }
        .modal-dialog { background: var(--card); border-radius: var(--radius); padding: 28px; max-width: 800px; width: 92%; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.15); transform: scale(0.95); transition: transform var(--transition); }
        .modal-overlay.open .modal-dialog { transform: scale(1); }
        .modal-body { display: flex; gap: 24px; flex-wrap: wrap; }
        .modal-cover img { width: 180px; border-radius: var(--radius-sm); }
        @media (max-width:600px) { .modal-body { flex-direction: column; align-items: center; } .modal-cover img { width: 140px; } }
        .preview-row { display: flex; gap: 10px; flex-wrap: wrap; margin: 12px 0; }
        .preview-row img { width: 80px; height: 60px; object-fit: cover; border-radius: 8px; cursor: pointer; transition: transform var(--transition); }
        .preview-row img:hover { transform: scale(1.05); border: 1px solid var(--primary); }
        .rating-star { font-size: 1.5rem; color: #ccc; cursor: pointer; transition: 0.1s; }
        .rating-star.filled { color: #f5a623; }
        .comment-item { background: rgba(0,0,0,0.02); border-radius: 12px; padding: 12px; margin-bottom: 10px; }
        .back-top { position: fixed; bottom: 20px; right: 20px; width: 44px; height: 44px; border-radius: 50%; background: var(--primary); color: #fff; border: none; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow); cursor: pointer; z-index:30; }
        .img-viewer { position: fixed; inset:0; z-index:300; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; opacity:0; visibility:hidden; transition:0.3s; }
        .img-viewer.active { opacity:1; visibility:visible; }
        .img-viewer img { max-width: 90vw; max-height: 90vh; transform: scale(0.9); transition: transform 0.4s; }
        .img-viewer.active img { transform: scale(1); }

        /* 骨架屏 */
        .skeleton { background: linear-gradient(90deg, var(--card) 25%, rgba(255,255,255,0.3) 50%, var(--card) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: var(--radius); }
        @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
        .skeleton-card { height: 100%; aspect-ratio: 3/4; }

        /* 分类入口网格 */
        .category-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 16px; margin-bottom: 32px; }
        .category-item { background: var(--card); border-radius: var(--radius-sm); padding: 20px 10px; text-align: center; border: 1px solid var(--border); cursor: pointer; transition: all var(--transition); }
        .category-item:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: var(--shadow-hover); }
        .category-icon { font-size: 2rem; margin-bottom: 8px; }
        .category-name { font-size: 0.85rem; font-weight: 600; }
    </style>
</head>
<body>
    <div id="appContainer">
        <!-- 导航栏 -->
        <nav class="nav-bar" id="navBar">
            <div class="nav-logo" onclick="navigateTo('home')">Galfang</div>
            <ul class="nav-links" id="navLinks">
                <li><button class="btn active" onclick="navigateTo('home')" data-page="home">首页</button></li>
                <li><button class="btn" onclick="navigateTo('category')" data-page="category">分类浏览</button></li>
                <li><button class="btn green" onclick="randomGame()">🎲 随机推荐</button></li>
            </ul>
            <div style="display:flex; gap:12px; align-items:center;">
                <div class="search-box" style="position:relative">
                    <span>🔍</span>
                    <input type="text" id="searchInput" placeholder="搜索游戏..." autocomplete="off">
                    <button id="searchClear" style="display:none; background:none; border:none; cursor:pointer;">✕</button>
                </div>
                <button class="btn" id="themeToggle" onclick="toggleTheme()" style="background:transparent; border:1px solid var(--border);">🌙</button>
                <button class="menu-toggle" onclick="document.getElementById('navLinks').classList.toggle('open')">☰</button>
            </div>
        </nav>

        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 首页视图 -->
            <div id="homeView">
                <!-- Hero -->
                <div class="hero">
                    <h1>探索你喜欢的 Galgame</h1>
                    <p>发现纯粹、简洁、高速的琉璃资源库</p>
                    <div class="hero-btns">
                        <button class="btn primary" onclick="navigateTo('category')">浏览分类</button>
                        <button class="btn pink" onclick="randomGame()">🎲 随机推荐</button>
                    </div>
                </div>
                <!-- 今日推荐（横向滚动） -->
                <div class="horizontal-scroll">
                    <div class="section-title">今日推荐</div>
                    <div class="scroll-cards" id="dailyScroll"></div>
                </div>
                <!-- 分类入口 -->
                <div class="section-title">分类入口</div>
                <div class="category-grid" id="categoryEntries"></div>
                <!-- 精选推荐 -->
                <div class="section-title">精选推荐</div>
                <div class="game-grid" id="featuredGrid">
                    <div class="skeleton skeleton-card"></div>
                    <div class="skeleton skeleton-card"></div>
                    <div class="skeleton skeleton-card"></div>
                    <div class="skeleton skeleton-card"></div>
                </div>
                <!-- 搜索结果显示区 -->
                <div class="game-grid" id="searchResults" style="display:none;"></div>
                <div id="searchStatus" style="display:none; text-align:center; margin-top:20px;"></div>
                <div id="onlineTimer" style="text-align:center; margin-top:30px; color:var(--text-light);">在线 00:00:00</div>
            </div>

            <!-- 分类视图 -->
            <div id="categoryView" style="display:none;">
                <div class="section-title">全部作品</div>
                <div class="filter-section" id="filterSection"></div>
                <div class="game-grid" id="categoryGrid"></div>
                <div id="noResults" style="display:none; text-align:center; padding:40px;">暂时没有游戏，试试其他分类吧~</div>
            </div>
        </div>
    </div>

    <!-- 详情弹窗 -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
        <div class="modal-dialog" onclick="event.stopPropagation()">
            <button class="btn" onclick="closeModal()" style="float:right; background:transparent;">✕</button>
            <div class="modal-body" id="modalBody"></div>
            <div id="likeSection" style="margin-top:18px;"></div>
            <div id="ratingSection" style="margin-top:12px;"></div>
            <div id="commentSection" style="margin-top:20px;"></div>
        </div>
    </div>

    <!-- 图片查看器 -->
    <div class="img-viewer" id="imgViewer" onclick="this.classList.remove('active')">
        <img id="imgViewerImg" src="">
    </div>
    <button class="back-top" id="backTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        (function() {
            const API_BASE = 'https://galgame-api.fanggal.workers.dev';
            const userId = (() => { let id = localStorage.getItem('gl_userId'); if (!id) { id = 'u_' + Date.now(); localStorage.setItem('gl_userId', id); } return id; })();
            const COMMON_TAGS = ['纯爱','剧情','奇幻','科幻','和风','治愈','悬疑','青春','校园','恋爱','后宫','战斗','催泪','萝莉','重口','全年龄'];
            let gamesData = [];

            // ================= 工具函数 =================
            function createCard(game) {
                let tags = (game.tags||[]).slice(0,3).map(t => `<span class="tag">${t}</span>`).join('');
                if (game.isChinese) tags += '<span class="tag hot">汉化</span>';
                return `<div class="game-card" onclick="openGameDetail(${game.id})">
                    <img class="card-cover" src="${game.cover}" loading="lazy" onerror="this.style.background='var(--card)'">
                    <div class="card-body"><div class="card-title">${game.title}</div><div class="card-tags">${tags}</div></div>
                </div>`;
            }

            function getTodaySeed() {
                const now = new Date(); return now.getFullYear()*10000 + (now.getMonth()+1)*100 + now.getDate();
            }

            function randomGame() {
                if (!gamesData.length) return;
                const idx = Math.floor(Math.random() * gamesData.length);
                openGameDetail(gamesData[idx].id);
            }

            // ================= 页面导航 =================
            window.navigateTo = function(page) {
                if (currentPage === page) return;
                currentPage = page;
                document.getElementById('homeView').style.display = (page==='home')?'block':'none';
                document.getElementById('categoryView').style.display = (page==='category')?'block':'none';
                document.querySelectorAll('.nav-links .btn').forEach(b => b.classList.remove('active'));
                const activeBtn = document.querySelector(`.nav-links .btn[data-page="${page}"]`);
                if (activeBtn) activeBtn.classList.add('active');
                if (page === 'home') { clearSearch(); renderHome(); }
                if (page === 'category') { clearSearch(); renderCategory(); }
                window.location.hash = page;
            };
            window.goToTag = (tag) => { currentFilter = tag; navigateTo('category'); };
            window.setFilter = (f) => { currentFilter = f; renderCategory(); };

            let currentPage = 'home', currentFilter = 'all';

            function clearSearch() {
                searchInput.value = ''; document.getElementById('searchClear').style.display = 'none';
                document.getElementById('searchResults').style.display = 'none';
                document.getElementById('searchStatus').style.display = 'none';
            }

            // ================= 首页渲染 =================
            function renderHome() {
                if (!gamesData.length) return;
                // 今日推荐
                const todaySeed = getTodaySeed();
                const todayGame = gamesData[todaySeed % gamesData.length];
                document.getElementById('dailyScroll').innerHTML = todayGame ? `<div style="flex:0 0 200px; scroll-snap-align:start;">${createCard(todayGame)}</div>` : '';
                // 分类入口
                const catEntries = COMMON_TAGS.map(tag => `
                    <div class="category-item" onclick="goToTag('${tag}')">
                        <div class="category-icon">🏷️</div>
                        <div class="category-name">${tag}</div>
                    </div>`).join('');
                document.getElementById('categoryEntries').innerHTML = catEntries;
                // 精选推荐
                const featured = gamesData.filter(g => g.featured);
                document.getElementById('featuredGrid').innerHTML = (featured.length ? featured : gamesData.slice(0,8)).map(g => createCard(g)).join('');
            }

            function renderCategory() {
                let filtered = gamesData;
                if (currentFilter !== 'all') {
                    if (['PC','Android','krkr','Ty','ONS','android_direct'].includes(currentFilter))
                        filtered = gamesData.filter(g => g.platforms?.some(p => p.type===currentFilter || p.sub===currentFilter));
                    else if (currentFilter === 'chinese') filtered = gamesData.filter(g => g.isChinese);
                    else filtered = gamesData.filter(g => g.tags?.includes(currentFilter));
                }
                document.getElementById('categoryGrid').innerHTML = filtered.map(g => createCard(g)).join('');
                document.getElementById('noResults').style.display = filtered.length ? 'none' : 'block';
                const filters = ['all','PC','Android','krkr','Ty','ONS','android_direct','chinese',...COMMON_TAGS];
                document.getElementById('filterSection').innerHTML = filters.map(f => {
                    let label = f; if (f==='android_direct') label='安卓直装'; if (f==='chinese') label='汉化';
                    return `<button class="filter-btn ${currentFilter===f?'active':''}" onclick="setFilter('${f}')">${label}</button>`;
                }).join('');
            }

            // ================= 搜索 =================
            const searchInput = document.getElementById('searchInput');
            const searchClear = document.getElementById('searchClear');
            searchInput.addEventListener('input', () => {
                const term = searchInput.value.trim();
                searchClear.style.display = term ? 'block' : 'none';
                if (term) {
                    const results = gamesData.filter(g => g.title.toLowerCase().includes(term.toLowerCase()) || g.tags?.some(t => t.includes(term)));
                    document.getElementById('featuredGrid').style.display = 'none';
                    document.getElementById('searchResults').style.display = '';
                    document.getElementById('searchResults').innerHTML = results.map(g => createCard(g)).join('');
                    document.getElementById('searchStatus').style.display = 'block';
                    document.getElementById('searchStatus').textContent = results.length ? `找到 ${results.length} 个游戏` : '未找到相关游戏';
                } else {
                    document.getElementById('featuredGrid').style.display = '';
                    document.getElementById('searchResults').style.display = 'none';
                    document.getElementById('searchStatus').style.display = 'none';
                    renderHome();
                }
            });
            searchClear.addEventListener('click', () => { searchInput.value=''; searchClear.style.display='none'; renderHome(); });

            // ================= 详情与弹窗 =================
            window.openGameDetail = async function(id) {
                const game = gamesData.find(g => g.id == id); if (!game) return;
                const modal = document.getElementById('modalOverlay');
                document.getElementById('modalBody').innerHTML = `
                    <div class="modal-cover"><img src="${game.cover}" onerror="this.style.background='var(--card)'"></div>
                    <div style="flex:1;">
                        <h2>${game.title}</h2>
                        <div class="card-tags">${(game.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
                        <p style="margin-top:12px;">${game.description||''}</p>
                        ${game.previewImages?.length ? `<div class="preview-row">${game.previewImages.map(img => `<img src="${img}" onclick="openImageViewer('${img}')">`).join('')}</div>` : ''}
                        <div style="display:flex; flex-wrap:wrap; gap:8px; margin-top:16px;">
                            ${['PC','krkr','Ty','ONS','android_direct'].map(k => {
                                const has = game.platforms?.some(p => (k==='PC'?p.type==='PC':p.sub===k));
                                const dl = game.downloads?.[k] || {};
                                if (!has) return `<button class="btn disabled">${k} (无资源)</button>`;
                                if (dl.url) return `<button class="btn primary" data-url="${dl.url}" data-source="${dl.source||''}" data-instructions="${dl.instructions||''}" onclick="confirmDownload(this)">${k} | ${dl.source||''}</button>`;
                                return `<button class="btn disabled">${k} (待添加)</button>`;
                            }).join('')}
                        </div>
                    </div>`;
                const likeRes = await fetch(`${API_BASE}/api/likes/${id}?userId=${userId}`).then(r=>r.json());
                document.getElementById('likeSection').innerHTML = `<button class="btn pink ${likeRes.liked?'liked':''}" onclick="toggleLike(${id})">❤️ ${likeRes.liked?'已赞':'点赞'}</button><span style="margin-left:10px;">${likeRes.count} 人赞过</span>`;
                const ratingRes = await fetch(`${API_BASE}/api/ratings/${id}?userId=${userId}`).then(r=>r.json());
                let stars = '';
                for (let i=1;i<=5;i++) stars += `<span class="rating-star ${i<=ratingRes.myRating?'filled':''}" onclick="submitRating(${id},${i})">★</span>`;
                document.getElementById('ratingSection').innerHTML = `<span>评分：</span><span style="display:inline-flex; gap:4px;">${stars}</span><span style="margin-left:8px;">(${ratingRes.average?.toFixed(1)||0} 分)</span>`;
                const comments = await fetch(`${API_BASE}/api/comments/${id}`).then(r=>r.json());
                document.getElementById('commentSection').innerHTML = `
                    <h3>💬 评论 (${comments.length})</h3>
                    ${comments.map(c => `<div class="comment-item"><b>${escapeHtml(c.name)}</b> <small>${new Date(c.time).toLocaleString()}</small><p>${escapeHtml(c.text)}</p></div>`).join('')}
                    <div style="display:flex; gap:8px; margin-top:12px;">
                        <input id="cmName" placeholder="名字" style="flex:1; padding:10px; border-radius:20px; border:1px solid var(--border); background:var(--card); color:var(--text);">
                        <input id="cmText" placeholder="写下评论..." style="flex:2; padding:10px; border-radius:20px; border:1px solid var(--border); background:var(--card); color:var(--text);">
                        <button class="btn primary" onclick="submitComment(${id})">发送</button>
                    </div>`;
                modal.classList.add('open');
                window.location.hash = `detail/${id}`;
            };
            function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
            window.openImageViewer = (src) => { const v=document.getElementById('imgViewer'); document.getElementById('imgViewerImg').src=src; v.classList.add('active'); };
            window.confirmDownload = (btn) => {
                const url=btn.dataset.url, source=btn.dataset.source||'未知', ins=btn.dataset.instructions||'';
                const overlay=document.createElement('div'); overlay.style.cssText='position:fixed;inset:0;z-index:999;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;';
                overlay.innerHTML=`<div style="background:var(--card); border-radius:var(--radius); padding:24px; max-width:360px;"><h3>确认下载</h3><p>来源：${source}</p>${ins?`<p>说明：${ins}</p>`:''}<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;"><button class="btn" onclick="this.closest('div').parentElement.remove()">取消</button><button class="btn primary" onclick="window.open('${url}','_blank');this.closest('div').parentElement.remove()">确认下载</button></div></div>`;
                overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();}); document.body.appendChild(overlay);
            };
            window.toggleLike = async (id) => { await fetch(`${API_BASE}/api/likes/${id}`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId})}); openGameDetail(id); };
            window.submitRating = async (id,rating) => { await fetch(`${API_BASE}/api/ratings/${id}`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId,rating})}); openGameDetail(id); };
            window.submitComment = async (id) => { const name=document.getElementById('cmName').value.trim(); const text=document.getElementById('cmText').value.trim(); if(!name||!text)return; await fetch(`${API_BASE}/api/comments/${id}`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,text})}); openGameDetail(id); };
            window.closeModal = () => { document.getElementById('modalOverlay').classList.remove('open'); window.location.hash='home'; };

            // 主题切换
            window.toggleTheme = () => {
                document.body.classList.toggle('dark');
                const isDark = document.body.classList.contains('dark');
                localStorage.setItem('theme', isDark?'dark':'light');
                document.getElementById('themeToggle').textContent = isDark ? '☀️' : '🌙';
            };
            (function initTheme(){ const t=localStorage.getItem('theme')||'light'; if(t==='dark'){ document.body.classList.add('dark'); document.getElementById('themeToggle').textContent='☀️'; } })();

            // 导航滚动效果
            window.addEventListener('scroll', () => {
                document.getElementById('navBar').classList.toggle('scrolled', window.scrollY > 10);
                document.getElementById('backTop').style.display = window.scrollY > 400 ? 'flex' : 'none';
            });
            setInterval(()=>{ let s=(window.onlineSec=(window.onlineSec||0)+1), h=Math.floor(s/3600), m=Math.floor(s%3600/60), se=s%60; document.getElementById('onlineTimer').textContent=`在线 ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(se).padStart(2,'0')}`; },1000);

            // 启动
            window.addEventListener('load', async () => {
                try { gamesData = await (await fetch(API_BASE + '/api/games')).json(); } catch { gamesData = []; }
                gamesData.forEach(g => { g.downloads = g.downloads || {}; g.previewImages = g.previewImages || []; });
                renderHome();
                renderCategory();
                window.addEventListener('hashchange', () => {
                    const hash = window.location.hash.slice(1);
                    if (hash.startsWith('detail/')) { const id = parseInt(hash.split('/')[1]); if (id) openGameDetail(id); }
                    else if (hash === 'category') navigateTo('category');
                    else navigateTo('home');
                });
                if (window.location.hash === '#category') navigateTo('category');
            });
        })();
    </script>
</body>
</html>
