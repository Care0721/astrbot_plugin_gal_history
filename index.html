<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galfang · 佐久真纺</title>

    <link rel="icon" type="image/png" href="https://github.com/Care0721/Fanggal/blob/master/Lain.png">
    <meta property="og:title" content="Galfang 佐久真诗">
    <meta property="og:description" content="发现更多Galgame资源，纯粹、简洁、高速。">
    <meta property="og:image" content="https://github.com/Care0721/Fanggal/blob/master/Lain.png">
    <meta property="og:url" content="https://care0721.github.io/Fanggal">
    <meta property="og:type" content="website">

    <style>
        :root {
            --bg: #f5f7fa;
            --bg-card: rgba(255, 255, 255, 0.85);
            --bg-nav: rgba(255, 255, 255, 0.7);
            --bg-modal: rgba(255, 255, 255, 0.95);
            --text: #1a2233;
            --text-light: #5e6e82;
            --border: rgba(30, 40, 60, 0.08);
            --primary: #4b8bb4;
            --accent-pink: #d47b8c;
            --accent-green: #6ba589;
            --shadow: 0 8px 24px rgba(30, 40, 60, 0.08);
            --shadow-hover: 0 12px 30px rgba(75, 139, 180, 0.2);
            --radius: 14px;
            --transition: 0.2s cubic-bezier(0.2, 0, 0, 1);
        }
        body.dark {
            --bg: #0e1118;
            --bg-card: rgba(22, 26, 35, 0.85);
            --bg-nav: rgba(14, 17, 24, 0.7);
            --bg-modal: rgba(22, 26, 35, 0.95);
            --text: #e1e6ee;
            --text-light: #8a94a6;
            --border: rgba(255, 255, 255, 0.06);
            --primary: #6ba5cc;
            --accent-pink: #e09eaa;
            --accent-green: #7eb99a;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior:smooth; font-size:16px; }
        body { background: var(--bg); color: var(--text); font-family: 'SimSun', 'Songti SC', '宋体', serif; min-height:100vh; overflow-x:hidden; line-height:1.6; transition: background 0.4s, color 0.4s; }
        button { cursor:pointer; font-family: inherit; transition: all var(--transition); }
        button:active { transform: scale(0.96); }
        #particleCanvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none; }
        #bootScreen { position:fixed; inset:0; z-index:9999; background:#0e1118; display:flex; align-items:center; justify-content:center; flex-direction:column; transition: opacity 0.7s; }
        #bootScreen.hidden { opacity:0; visibility:hidden; pointer-events:none; }
        .boot-box { background:rgba(14,17,24,0.9); border:1px solid #4b8bb4; border-radius:12px; padding:30px 40px; max-width:500px; color:#b4cde0; }
        .boot-line { font-size:0.8rem; margin:5px 0; opacity:0; animation:bootIn 0.25s forwards; }
        .boot-line:nth-child(2){animation-delay:.2s} .boot-line:nth-child(3){animation-delay:.45s} .boot-line:nth-child(4){animation-delay:.7s} .boot-line:nth-child(5){animation-delay:.95s} .boot-line:nth-child(6){animation-delay:1.2s;color:#e09eaa} .boot-line:nth-child(7){animation-delay:1.5s;color:#6ba589}
        @keyframes bootIn { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
        #appContainer { position:relative; z-index:1; opacity:0; transition: opacity 0.5s; }
        #appContainer.visible { opacity:1; }
        .nav-bar { position:sticky; top:0; z-index:100; background:var(--bg-nav); backdrop-filter:blur(16px); border-bottom:1px solid var(--border); padding:0 24px; height:62px; display:flex; align-items:center; justify-content:space-between; box-shadow:var(--shadow); }
        .nav-logo { font-size:1.5rem; font-weight:800; cursor:pointer; background:linear-gradient(135deg, var(--primary), var(--accent-pink)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .nav-links { display:flex; gap:4px; list-style:none; }
        .nav-links button { background:transparent; border:none; color:var(--text-light); padding:8px 16px; border-radius:20px; font-size:0.9rem; }
        .nav-links button:hover, .nav-links button.active { color:var(--primary); background:rgba(75,139,180,0.12); }
        .theme-btn { background:transparent; border:1px solid var(--border); color:var(--text); width:38px; height:38px; border-radius:12px; display:flex; align-items:center; justify-content:center; }
        .search-area { position:relative; }
        .search-box { display:flex; align-items:center; background:var(--bg-card); border:1px solid var(--border); border-radius:24px; padding:6px 14px; }
        .search-box input { background:transparent; border:none; color:var(--text); outline:none; width:130px; font-family:inherit; }
        .search-history { position:absolute; top:100%; left:0; right:0; background:var(--bg-card); border:1px solid var(--border); border-radius:12px; margin-top:6px; list-style:none; max-height:200px; overflow-y:auto; display:none; z-index:150; }
        .search-history li { padding:8px 14px; cursor:pointer; color:var(--text); font-size:0.85rem; }
        .search-history li:hover { background:rgba(75,139,180,0.1); }
        .main-content { padding:20px 24px; max-width:1300px; margin:0 auto; }
        .game-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(200px,1fr)); gap:20px; margin-top:16px; }
        .game-card { background:var(--bg-card); border-radius:var(--radius); overflow:hidden; cursor:pointer; border:1px solid var(--border); transition:0.3s; }
        .game-card:hover { transform:translateY(-6px); border-color:var(--primary); box-shadow:var(--shadow-hover); }
        .card-cover { width:100%; aspect-ratio:3/4; object-fit:cover; }
        .card-body { padding:12px; }
        .card-title { font-weight:700; font-size:0.95rem; }
        .card-tags { display:flex; gap:4px; flex-wrap:wrap; margin-top:6px; }
        .tag { font-size:0.7rem; padding:2px 8px; border-radius:6px; background:rgba(75,139,180,0.12); color:var(--primary); cursor:pointer; white-space:nowrap; }
        .filter-section { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:24px; }
        .filter-btn { padding:6px 16px; border-radius:20px; border:1px solid var(--border); background:var(--bg-card); color:var(--text-light); cursor:pointer; font-size:0.8rem; }
        .filter-btn.active { background:rgba(75,139,180,0.15); color:var(--primary); border-color:var(--primary); }
        .modal-overlay { position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0.6); display:flex; align-items:center; justify-content:center; opacity:0; visibility:hidden; transition:0.25s; }
        .modal-overlay.open { opacity:1; visibility:visible; }
        .modal-dialog { background:var(--bg-modal); border-radius:var(--radius); padding:28px; max-width:850px; width:90%; max-height:85vh; overflow-y:auto; border:1px solid var(--border); animation:modalIn 0.3s; }
        @keyframes modalIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        .dl-btn { padding:8px 18px; border-radius:24px; border:1px solid var(--primary); background:rgba(75,139,180,0.1); color:var(--primary); cursor:pointer; }
        .dl-btn:hover { background:var(--primary); color:#fff; }
        .like-btn { padding:6px 16px; border-radius:20px; border:1px solid var(--accent-pink); background:rgba(212,123,140,0.1); color:var(--accent-pink); }
        .like-btn.liked { background:var(--accent-pink); color:#fff; }
        .rating-stars { display:flex; gap:2px; margin:8px 0; }
        .rating-star { font-size:1.5rem; color:var(--border); cursor:pointer; transition:0.1s; }
        .rating-star.filled { color:#ffb347; }
        .back-top { position:fixed; bottom:24px; right:24px; width:44px; height:44px; border-radius:50%; background:var(--primary); color:#fff; border:none; display:flex; align-items:center; justify-content:center; }
    </style>
</head>
<body>
    <canvas id="particleCanvas"></canvas>
    <div id="bootScreen">
        <div class="boot-box">
            <div style="font-size:0.9rem; margin-bottom:12px; letter-spacing:2px;"> G A L F A N G · 初 始 化</div>
            <div class="boot-line">> 加载资源索引...</div>
            <div class="boot-line">> 校验数据库完整性... OK</div>
            <div class="boot-line">> 启动渲染引擎... OK</div>
            <div class="boot-line">> 连接粒子网络...</div>
            <div class="boot-line">> 正在加载资源库...</div>
            <div class="boot-line">> 一直卡在此界面请开启VPN</div>
        </div>
    </div>

    <div id="appContainer">
        <nav class="nav-bar">
            <div class="nav-logo" onclick="navigateTo('home')">Galfang</div>
            <ul class="nav-links" id="navLinks">
                <li><button onclick="navigateTo('home')" data-page="home" class="active">首页</button></li>
                <li><button onclick="navigateTo('category')" data-page="category">分类浏览</button></li>
            </ul>
            <div class="search-area">
                <div class="search-box"><span style="margin-right:4px;">🔍</span><input type="text" id="searchInput" placeholder="搜索..." oninput="handleSearchInput(this.value)"></div>
                <ul class="search-history" id="searchHistory"></ul>
            </div>
            <button class="theme-btn" id="themeToggle" onclick="toggleTheme()">🌓</button>
        </nav>

        <div class="main-content">
            <div id="homeView">
                <div class="banner-section" id="bannerSection" style="height:200px; background:var(--bg-card); border-radius:var(--radius); margin-bottom:24px;"></div>
                <div id="homeTagCloud" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px;"></div>
                <h2 style="margin-bottom:16px;">站长推荐</h2>
                <div class="game-grid" id="featuredGrid"></div>
                <div style="text-align:center; margin-top:30px; color:var(--text-light);" id="onlineTimer">在线 00:00:00</div>
            </div>
            <div id="categoryView" style="display:none;">
                <h2 style="margin-bottom:16px;">全部作品</h2>
                <div class="filter-section" id="filterSection"></div>
                <div class="game-grid" id="categoryGrid"></div>
                <div id="noResults" style="display:none; text-align:center; padding:40px; color:var(--text-light);">暂时没有游戏，试试其他分类吧~</div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
        <div class="modal-dialog" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal()" style="float:right; background:transparent; border:none; font-size:1.5rem;">×</button>
            <div class="modal-body" id="modalBody"></div>
            <div id="likeSection" style="margin:16px 0;"></div>
            <div id="ratingSection" style="margin:16px 0;"></div>
            <div id="commentSection"></div>
        </div>
    </div>
    <button class="back-top" id="backTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

    <script>
        const API_BASE = 'https://galgame-api.fanggal.workers.dev';
        const userId = localStorage.getItem('gl_userId') || (() => { const id = 'u_' + Date.now(); localStorage.setItem('gl_userId', id); return id; })();
        const COMMON_TAGS = ['纯爱','剧情','奇幻','科幻','和风','治愈','悬疑','青春','校园','恋爱','后宫','搞笑','催泪','全年龄'];
        let gamesData = [];
        let currentPage = 'home', currentFilter = 'all', bannerIndex = 0, bannerTimer, onlineSec = 0;

        // ========== 搜索历史 ==========
        function getSearchHistory() {
            try { return JSON.parse(localStorage.getItem('searchHistory') || '[]'); } catch { return []; }
        }
        function addSearchHistory(keyword) {
            if (!keyword.trim()) return;
            let history = getSearchHistory().filter(h => h !== keyword);
            history.unshift(keyword);
            if (history.length > 10) history.pop();
            localStorage.setItem('searchHistory', JSON.stringify(history));
        }
        function showHistory() {
            const list = document.getElementById('searchHistory');
            const history = getSearchHistory();
            if (history.length === 0) { list.style.display = 'none'; return; }
            list.innerHTML = history.map(h => `<li onclick="applySearch('${h}')">${h}</li>`).join('');
            list.style.display = 'block';
        }
        function hideHistory() { setTimeout(() => document.getElementById('searchHistory').style.display = 'none', 200); }
        function applySearch(keyword) {
            document.getElementById('searchInput').value = keyword;
            document.getElementById('searchHistory').style.display = 'none';
            performSearch(keyword);
        }
        function handleSearchInput(value) {
            if (value.trim()) showHistory();
            else { document.getElementById('searchHistory').style.display = 'none'; performSearch(''); }
        }
        function performSearch(q) {
            if (!q.trim()) { navigateTo('home'); return; }
            addSearchHistory(q.trim());
            const results = gamesData.filter(g => g.title.includes(q) || g.tags?.some(t=>t.includes(q)));
            document.getElementById('homeView').style.display = 'block';
            document.getElementById('categoryView').style.display = 'none';
            document.getElementById('featuredGrid').innerHTML = results.length ? results.map(g => createCard(g)).join('') : '<div style="text-align:center;padding:40px;">未找到游戏</div>';
        }

        // ========== 主题 ==========
        function toggleTheme() {
            document.body.classList.toggle('dark');
            localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
            document.getElementById('themeToggle').textContent = document.body.classList.contains('dark') ? '☀️' : '🌓';
        }
        (function initTheme() {
            const saved = localStorage.getItem('theme') || 'light';
            if (saved === 'dark') document.body.classList.add('dark');
            document.getElementById('themeToggle').textContent = saved === 'dark' ? '☀️' : '🌓';
        })();

        // ========== 数据加载 ==========
        async function fetchGames() {
            try { gamesData = await (await fetch(API_BASE + '/api/games')).json(); }
            catch { gamesData = []; }
            gamesData.forEach(g => { g.downloads = g.downloads || {}; g.previewImages = g.previewImages || []; });
        }

        // ========== 导航 ==========
        function navigateTo(page) {
            currentPage = page;
            document.getElementById('homeView').style.display = page === 'home' ? 'block' : 'none';
            document.getElementById('categoryView').style.display = page === 'category' ? 'block' : 'none';
            document.querySelectorAll('.nav-links button').forEach(b => b.classList.remove('active'));
            document.querySelector(`.nav-links button[data-page="${page}"]`)?.classList.add('active');
            if (page === 'home') renderHome();
            if (page === 'category') renderCategory();
            window.location.hash = page;
        }

        function renderHome() {
            if (!gamesData.length) {
                document.getElementById('featuredGrid').innerHTML = '<div style="text-align:center;padding:40px;">正在连接服务器...</div>';
                return;
            }
            const featured = gamesData.filter(g => g.featured);
            const banner = document.getElementById('bannerSection');
            if (featured.length) {
                const game = featured[bannerIndex % featured.length];
                banner.innerHTML = `<div style="background:url(${game.bannerBg||game.cover}) center/cover; height:100%; border-radius:14px;"></div>`;
            }
            document.getElementById('featuredGrid').innerHTML = gamesData.slice(0, 8).map(g => createCard(g)).join('');
            document.getElementById('homeTagCloud').innerHTML = COMMON_TAGS.map(t => `<span class="tag" onclick="goToTag('${t}')">${t}</span>`).join('');
            clearInterval(bannerTimer);
            bannerTimer = setInterval(() => { bannerIndex++; renderHome(); }, 5000);
        }

        function createCard(game) {
            let tags = '';
            game.platforms?.forEach(p => tags += `<span class="tag">${p.type==='PC'?'PC':p.sub||'安卓'}</span>`);
            if (game.isChinese) tags += '<span class="tag" style="background:rgba(212,123,140,0.12);color:var(--accent-pink);">汉化</span>';
            return `<div class="game-card" onclick="openGameDetail(${game.id})">
                <img class="card-cover" src="${game.cover}" loading="lazy" onerror="this.style.background='#e0e0e0'">
                <div class="card-body"><div class="card-title">${game.title}</div><div class="card-tags">${tags}</div></div>
            </div>`;
        }

        function goToTag(tag) { currentFilter = tag; navigateTo('category'); }

        function renderCategory() {
            let filtered = gamesData;
            const f = currentFilter;
            if (f !== 'all') {
                if (['PC','Android','krkr','Ty','ONS','android_direct'].includes(f)) filtered = gamesData.filter(g => g.platforms?.some(p => p.type===f || p.sub===f));
                else if (f === 'chinese') filtered = gamesData.filter(g => g.isChinese);
                else filtered = gamesData.filter(g => g.tags?.includes(f));
            }
            const grid = document.getElementById('categoryGrid');
            const noRes = document.getElementById('noResults');
            if (filtered.length === 0) { grid.innerHTML = ''; noRes.style.display = 'block'; }
            else { noRes.style.display = 'none'; grid.innerHTML = filtered.map(g => createCard(g)).join(''); }
            const filters = ['all','PC','Android','krkr','Ty','ONS','android_direct','chinese',...COMMON_TAGS];
            document.getElementById('filterSection').innerHTML = filters.map(ft => {
                const label = ft==='android_direct'?'安卓直装':ft==='chinese'?'汉化':ft;
                return `<button class="filter-btn ${currentFilter===ft?'active':''}" onclick="setFilter('${ft}')">${label}</button>`;
            }).join('');
        }

        function setFilter(f) { currentFilter = f; renderCategory(); }

        // ========== 详情与评分 ==========
        async function openGameDetail(id) {
            const game = gamesData.find(g => g.id == id);
            if (!game) return;
            const modal = document.getElementById('modalOverlay');
            // 渲染基础信息
            document.getElementById('modalBody').innerHTML = `
                <div style="display:flex; gap:20px;">
                    <img src="${game.cover}" style="width:200px; aspect-ratio:3/4; object-fit:cover; border-radius:12px;" onerror="this.style.background='#e0e0e0'">
                    <div style="flex:1;">
                        <h2>${game.title}</h2>
                        <div>${(game.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
                        <p style="margin-top:12px; color:var(--text-light);">${game.description||''}</p>
                    </div>
                </div>`;
            // 点赞
            const likeRes = await fetch(`${API_BASE}/api/likes/${id}?userId=${userId}`).then(r=>r.json());
            document.getElementById('likeSection').innerHTML = `
                <button class="like-btn ${likeRes.liked?'liked':''}" onclick="toggleLike(${id})">💞 ${likeRes.liked?'已赞':'点赞'}</button>
                <span style="margin-left:8px;">${likeRes.count} 人赞过</span>`;
            // 评分
            const ratingRes = await fetch(`${API_BASE}/api/ratings/${id}?userId=${userId}`).then(r=>r.json());
            const avg = ratingRes.average || 0;
            const myRating = ratingRes.myRating || 0;
            let starsHTML = '';
            for (let i = 1; i <= 5; i++) {
                starsHTML += `<span class="rating-star ${i <= myRating ? 'filled' : ''}" onclick="submitRating(${id}, ${i})">★</span>`;
            }
            document.getElementById('ratingSection').innerHTML = `
                <div style="display:flex; align-items:center; gap:8px;">
                    <span>评分：</span>
                    <div class="rating-stars">${starsHTML}</div>
                    <span style="color:var(--text-light);">(${avg.toFixed(1)} 分)</span>
                </div>`;
            // 评论（省略，如需保留评论可添加，但前面未实现）
            modal.classList.add('open');
            window.location.hash = `detail/${id}`;
        }

        async function toggleLike(id) {
            await fetch(`${API_BASE}/api/likes/${id}`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({userId}) });
            openGameDetail(id);
        }

        async function submitRating(gameId, rating) {
            await fetch(`${API_BASE}/api/ratings/${gameId}`, {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ userId, rating })
            });
            openGameDetail(gameId); // 刷新显示
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('open');
            window.location.hash = 'home';
        }

        setInterval(() => { onlineSec++; const h=Math.floor(onlineSec/3600), m=Math.floor(onlineSec%3600/60), s=onlineSec%60; document.getElementById('onlineTimer').textContent = `在线 ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`; }, 1000);

        window.addEventListener('load', async () => {
            await fetchGames();
            document.getElementById('bootScreen').classList.add('hidden');
            document.getElementById('appContainer').classList.add('visible');
            renderHome();
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.search-area')) document.getElementById('searchHistory').style.display = 'none';
            });
        });
    </script>
</body>
</html>
