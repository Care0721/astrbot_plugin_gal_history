<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galfang · 佐久真纺</title>

    <!-- 网站图标 (请替换 href 为你的图片链接) -->
    <link rel="icon" type="image/png" href="https://github.com/Care0721/Fanggal/blob/master/Lain.png">
    <meta property="og:title" content="Galfang 佐久真纺">
    <meta property="og:description" content="发现更多Galgame资源，纯粹、简洁、高速。">
    <meta property="og:image" content="https://github.com/Care0721/Fanggal/blob/master/Lain.png">
    <meta property="og:url" content="https://care0721.github.io/Fanggal">
    <meta property="og:type" content="website">

    <!-- Swiper 轮播样式 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        :root {
            --bg: #f5f7fa; --bg-card: rgba(255,255,255,0.85); --bg-nav: rgba(255,255,255,0.7);
            --bg-modal: rgba(255,255,255,0.95); --text: #1a2233; --text-light: #5e6e82;
            --border: rgba(30,40,60,0.08); --primary: #4b8bb4; --accent-pink: #d47b8c;
            --accent-green: #6ba589; --shadow: 0 8px 24px rgba(30,40,60,0.06);
            --shadow-hover: 0 12px 28px rgba(75,139,180,0.18);
            --radius: 14px; --radius-sm: 8px;
            --transition: 0.2s cubic-bezier(0.2, 0, 0, 1);
        }
        body.dark {
            --bg: #0e1118; --bg-card: rgba(22,26,35,0.85); --bg-nav: rgba(14,17,24,0.7);
            --bg-modal: rgba(22,26,35,0.95); --text: #e1e6ee; --text-light: #8a94a6;
            --border: rgba(255,255,255,0.06); --primary: #6ba5cc; --accent-pink: #e09eaa;
            --accent-green: #7eb99a;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior:smooth; font-size:16px; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'SimSun','Songti SC','宋体',serif;
            min-height:100vh; overflow-x:hidden; line-height:1.6;
            transition: background 0.3s, color 0.3s;
            -webkit-font-smoothing: antialiased;
        }
        *:focus { outline: none; }
        button, input, textarea { outline: none; }
        button {
            cursor:pointer; font-family:inherit;
            transition: all var(--transition);
            position: relative; overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        button:active { transform: scale(0.97); }
        #particleCanvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none; }
        #bootScreen { position:fixed; inset:0; z-index:9999; background:#0e1118; display:flex; align-items:center; justify-content:center; flex-direction:column; transition: opacity 0.6s; }
        #bootScreen.hidden { opacity:0; visibility:hidden; pointer-events:none; }
        .boot-box { background:rgba(14,17,24,0.9); border:1px solid #4b8bb4; border-radius:12px; padding:30px 40px; max-width:500px; color:#b4cde0; }
        .boot-line { font-size:0.8rem; margin:5px 0; opacity:0; animation:bootIn 0.25s forwards; }
        @keyframes bootIn { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:translateX(0)} }
        #appContainer { position:relative; z-index:1; opacity:0; transition: opacity 0.5s; }
        #appContainer.visible { opacity:1; }
        .nav-bar { position:sticky; top:0; z-index:100; background:var(--bg-nav); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border-bottom:1px solid var(--border); padding:0 20px; height:60px; display:flex; align-items:center; justify-content:space-between; box-shadow:var(--shadow); }
        .nav-logo { font-size:1.4rem; font-weight:800; cursor:pointer; background:linear-gradient(135deg, var(--primary), var(--accent-pink)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .nav-links { display:flex; gap:4px; list-style:none; }
        .nav-links button { background:transparent; border:none; color:var(--text-light); padding:8px 14px; border-radius:20px; font-size:0.9rem; }
        .nav-links button.active { color:var(--primary); background:rgba(75,139,180,0.12); }
        .theme-btn { background:transparent; border:1px solid var(--border); color:var(--text); width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:1.1rem; }
        .search-box { display:flex; align-items:center; background:var(--bg-card); border:1px solid var(--border); border-radius:24px; padding:5px 12px; }
        .search-box input { background:transparent; border:none; color:var(--text); outline:none; font-size:0.85rem; width:130px; font-family:inherit; }
        .search-box button { background:transparent; border:none; color:var(--text-light); cursor:pointer; }
        .menu-toggle { display:none; }
        @media (max-width:768px) {
            .nav-links { position:fixed; top:60px; left:0; right:0; background:var(--bg-nav); flex-direction:column; padding:16px; display:none; }
            .nav-links.open { display:flex; }
            .menu-toggle { display:block; }
        }
        .main-content { padding:20px 24px; max-width:1300px; margin:0 auto; }
        .swiper-container { border-radius:var(--radius); overflow:hidden; margin-bottom:24px; box-shadow:var(--shadow); }
        .swiper-slide { height:260px; background-size:cover; background-position:center; display:flex; align-items:flex-end; }
        .slide-overlay { background:linear-gradient(0deg, rgba(0,0,0,0.7) 0%, transparent 60%); }
        .slide-info { padding:24px; color:#fff; }
        .game-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:18px; margin:16px 0; }
        .game-card { background:var(--bg-card); border-radius:var(--radius); overflow:hidden; cursor:pointer; border:1px solid var(--border); transition:0.2s; }
        .game-card:hover { transform:translateY(-6px); border-color:var(--primary); box-shadow:var(--shadow-hover); }
        .card-cover { width:100%; aspect-ratio:3/4; object-fit:cover; display:block; }
        .card-body { padding:12px; }
        .card-title { font-weight:700; margin-bottom:4px; }
        .tag { font-size:0.65rem; padding:2px 8px; border-radius:6px; background:rgba(75,139,180,0.12); color:var(--primary); }
        .filter-section { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:24px; }
        .filter-btn { padding:6px 16px; border-radius:20px; border:1px solid var(--border); background:var(--bg-card); color:var(--text-light); cursor:pointer; }
        .filter-btn.active { background:rgba(75,139,180,0.15); color:var(--primary); border-color:var(--primary); }
        .modal-overlay { position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0.65); backdrop-filter:blur(8px); display:flex; align-items:center; justify-content:center; opacity:0; visibility:hidden; transition:0.3s; }
        .modal-overlay.open { opacity:1; visibility:visible; }
        .modal-dialog { background:var(--bg-modal); border-radius:var(--radius); padding:24px; max-width:800px; width:92%; max-height:85vh; overflow-y:auto; }
        .modal-close { float:right; background:transparent; border:none; font-size:1.5rem; cursor:pointer; }
        .modal-body { display:flex; gap:20px; flex-wrap:wrap; }
        .modal-cover img { width:180px; border-radius:var(--radius-sm); }
        .preview-row { display:flex; gap:8px; margin:12px 0; }
        .preview-row img { width:80px; height:60px; object-fit:cover; border-radius:6px; cursor:pointer; }
        .dl-btn { padding:8px 18px; border-radius:24px; border:1px solid var(--primary); background:rgba(75,139,180,0.1); color:var(--primary); cursor:pointer; margin-right:8px; margin-bottom:8px; }
        .dl-btn:hover { background:var(--primary); color:#fff; }
        .like-btn { padding:6px 16px; border-radius:20px; border:1px solid var(--accent-pink); background:rgba(212,123,140,0.1); color:var(--accent-pink); cursor:pointer; }
        .like-btn.liked { background:var(--accent-pink); color:#fff; }
        .rating-star { font-size:1.4rem; color:#ccc; cursor:pointer; }
        .rating-star.filled { color:#ffb347; }
        .comment-item { background:var(--bg-card); border-radius:8px; padding:10px; margin-bottom:8px; }
        .back-top { position:fixed; bottom:20px; right:20px; width:44px; height:44px; border-radius:50%; background:var(--primary); color:#fff; border:none; display:flex; align-items:center; justify-content:center; }
        .img-viewer { position:fixed; inset:0; z-index:9999; background:rgba(0,0,0,0.9); display:flex; align-items:center; justify-content:center; opacity:0; visibility:hidden; transition:0.3s; }
        .img-viewer.active { opacity:1; visibility:visible; }
        .img-viewer img { max-width:90vw; max-height:90vh; }
    </style>
</head>
<body>
    <canvas id="particleCanvas"></canvas>
    <div id="bootScreen"><div class="boot-box"><div>GALFANG 初始化</div><div class="boot-line">加载资源索引...</div><div class="boot-line">数据库校验 OK</div><div class="boot-line">启动渲染引擎...</div><div class="boot-line">正在加载资源库...</div><div class="boot-line">一直卡在此界面请开启VPN</div></div></div>

    <div id="appContainer">
        <nav class="nav-bar">
            <div class="nav-logo" onclick="navigateTo('home')">Galfang</div>
            <ul class="nav-links" id="navLinks">
                <li><button onclick="navigateTo('home')" data-page="home" class="active">首页</button></li>
                <li><button onclick="navigateTo('category')" data-page="category">分类浏览</button></li>
            </ul>
            <div style="display:flex; gap:12px; align-items:center;">
                <div class="search-box" style="position:relative">
                    <span>🔍</span>
                    <input type="text" id="searchInput" placeholder="搜索游戏..." autocomplete="off">
                    <button id="searchClear" style="display:none;">✕</button>
                    <ul id="searchHistory" style="position:absolute; top:100%; left:0; right:0; background:var(--bg-card); border-radius:var(--radius); list-style:none; display:none; z-index:10;"></ul>
                </div>
                <button class="theme-btn" id="themeToggle" onclick="toggleTheme()">🌓</button>
                <button class="menu-toggle" onclick="document.getElementById('navLinks').classList.toggle('open')">☰</button>
            </div>
        </nav>

        <div class="main-content">
            <div id="homeView">
                <div class="swiper-container" id="featuredSwiper"></div>
                <div id="homeTagCloud" style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px;"></div>
                <h2>站长推荐</h2>
                <div class="game-grid" id="featuredGrid"></div>
                <div id="onlineTimer" style="text-align:center; margin-top:30px;">在线 00:00:00</div>
            </div>
            <div id="categoryView" style="display:none;">
                <h2>全部作品</h2>
                <div class="filter-section" id="filterSection"></div>
                <div class="game-grid" id="categoryGrid"></div>
                <div id="noResults" style="display:none; text-align:center; padding:40px;">暂时没有游戏，试试其他分类吧~</div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
        <div class="modal-dialog" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <div class="modal-body" id="modalBody"></div>
            <div id="likeSection"></div>
            <div id="ratingSection"></div>
            <div id="commentSection"></div>
        </div>
    </div>

    <div class="img-viewer" id="imgViewer" onclick="this.classList.remove('active')">
        <img id="imgViewerImg" src="">
    </div>
    <button class="back-top" id="backTop" onclick="window.scrollTo({top:0})">↑</button>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        // ==================== 配置与工具 ====================
        const API_BASE = 'https://galgame-api.fanggal.workers.dev';
        const userId = (() => { let id = localStorage.getItem('gl_userId'); if (!id) { id = 'u_' + Date.now(); localStorage.setItem('gl_userId', id); } return id; })();
        const COMMON_TAGS = ['纯爱','剧情','奇幻','科幻','和风','治愈','悬疑','青春','校园','恋爱','后宫','搞笑','战斗','催泪','萝莉','全年龄'];
        let gamesData = [];
        let swiperInstance = null;
        let currentPage = 'home', currentFilter = 'all';

        // ==================== 初始化 ====================
        async function fetchGames() {
            try { gamesData = await (await fetch(API_BASE + '/api/games')).json(); }
            catch { gamesData = []; }
        }

        function createCard(game) {
            return `<div class="game-card" onclick="openGameDetail(${game.id})">
                <img class="card-cover" src="${game.cover}" loading="lazy" onerror="this.style.background='#e0e0e0'">
                <div class="card-body">
                    <div class="card-title">${game.title}</div>
                    <div class="card-tags">${(game.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
                </div>
            </div>`;
        }

        function renderHome() {
            if (!gamesData.length) {
                document.getElementById('featuredGrid').innerHTML = '正在连接服务器...';
                return;
            }
            // 轮播
            const featured = gamesData.filter(g => g.featured);
            const swiperContainer = document.getElementById('featuredSwiper');
            if (featured.length && swiperContainer) {
                swiperContainer.innerHTML = `<div class="swiper-wrapper">${featured.map(g => `
                    <div class="swiper-slide" style="background-image:url('${g.bannerBg || g.cover}')" onclick="openGameDetail(${g.id})">
                        <div class="slide-overlay"></div>
                        <div class="slide-info"><h2>${g.title}</h2><p>${g.description?.slice(0,50) || ''}</p></div>
                    </div>`).join('')}</div><div class="swiper-pagination"></div>`;
                if (swiperInstance) swiperInstance.destroy();
                swiperInstance = new Swiper('#featuredSwiper', {
                    slidesPerView: 1, spaceBetween: 0, loop: featured.length > 1,
                    autoplay: { delay: 4000, disableOnInteraction: false },
                    pagination: { el: '.swiper-pagination', clickable: true },
                    speed: 600, grabCursor: true,
                });
            }
            document.getElementById('featuredGrid').innerHTML = gamesData.slice(0, 8).map(g => createCard(g)).join('');
            document.getElementById('homeTagCloud').innerHTML = COMMON_TAGS.map(t => `<span class="tag" style="cursor:pointer;" onclick="goToTag('${t}')">${t}</span>`).join('');
        }

        // ==================== 导航 ====================
        function navigateTo(page) {
            currentPage = page;
            document.getElementById('homeView').style.display = page === 'home' ? 'block' : 'none';
            document.getElementById('categoryView').style.display = page === 'category' ? 'block' : 'none';
            document.querySelectorAll('.nav-links button').forEach(b => b.classList.remove('active'));
            document.querySelector(`.nav-links button[data-page="${page}"]`)?.classList.add('active');
            if (page === 'home') renderHome();
            if (page === 'category') renderCategory();
            window.location.hash = page;
        }

        function goToTag(tag) { currentFilter = tag; navigateTo('category'); }

        function renderCategory() {
            let filtered = gamesData;
            const f = currentFilter;
            if (f !== 'all') {
                if (['PC','Android','krkr','Ty','ONS','android_direct'].includes(f)) filtered = gamesData.filter(g => g.platforms?.some(p => p.type===f || p.sub===f));
                else if (f === 'chinese') filtered = gamesData.filter(g => g.isChinese);
                else filtered = gamesData.filter(g => g.tags?.includes(f));
            }
            document.getElementById('categoryGrid').innerHTML = filtered.length ? filtered.map(g => createCard(g)).join('') : '';
            document.getElementById('noResults').style.display = filtered.length ? 'none' : 'block';
            document.getElementById('filterSection').innerHTML = ['all','PC','Android','krkr','Ty','ONS','android_direct','chinese',...COMMON_TAGS].map(ft => {
                let label = ft;
                if (ft === 'android_direct') label = '安卓直装';
                if (ft === 'chinese') label = '汉化';
                return `<button class="filter-btn ${currentFilter===ft?'active':''}" onclick="setFilter('${ft}')">${label}</button>`;
            }).join('');
        }

        function setFilter(f) { currentFilter = f; renderCategory(); }

        // ==================== 搜索 ====================
        const searchInput = document.getElementById('searchInput');
        const searchClear = document.getElementById('searchClear');
        const searchHistory = document.getElementById('searchHistory');

        function getSearchHistory() { try { return JSON.parse(localStorage.getItem('searchHistory')||'[]'); } catch { return []; } }
        function addSearchHistory(keyword) {
            if (!keyword.trim()) return;
            let history = getSearchHistory().filter(h => h !== keyword);
            history.unshift(keyword);
            if (history.length > 10) history.pop();
            localStorage.setItem('searchHistory', JSON.stringify(history));
        }
        function updateHistoryUI() {
            const history = getSearchHistory();
            searchHistory.innerHTML = history.map(h => `<li style="padding:8px 12px; cursor:pointer;">${h}</li>`).join('');
        }

        searchInput.addEventListener('input', () => {
            const term = searchInput.value.trim();
            searchClear.style.display = term ? 'block' : 'none';
            if (term) {
                addSearchHistory(term);
                performSearch(term);
            } else {
                if (currentPage === 'home') renderHome();
                else renderCategory();
                searchHistory.style.display = 'none';
            }
        });

        searchInput.addEventListener('focus', () => { updateHistoryUI(); searchHistory.style.display = 'block'; });
        searchInput.addEventListener('blur', () => setTimeout(() => searchHistory.style.display = 'none', 200));
        searchHistory.addEventListener('mousedown', (e) => {
            if (e.target.tagName === 'LI') {
                searchInput.value = e.target.textContent;
                performSearch(e.target.textContent);
                searchHistory.style.display = 'none';
            }
        });
        searchClear.addEventListener('click', () => { searchInput.value = ''; searchClear.style.display = 'none'; if (currentPage === 'home') renderHome(); else renderCategory(); });

        function performSearch(term) {
            if (!term) return;
            const results = gamesData.filter(g => g.title.toLowerCase().includes(term.toLowerCase()) || g.tags?.some(t => t.includes(term)));
            const gridId = currentPage === 'home' ? 'featuredGrid' : 'categoryGrid';
            document.getElementById(gridId).innerHTML = results.length ? results.map(g => createCard(g)).join('') : '<div style="grid-column:1/-1; padding:40px;">未找到相关游戏</div>';
        }

        // ==================== 详情弹窗 ====================
        async function openGameDetail(id) {
            const game = gamesData.find(g => g.id == id);
            if (!game) return;
            const modal = document.getElementById('modalOverlay');
            document.getElementById('modalBody').innerHTML = `<div class="modal-cover"><img src="${game.cover}" onerror="this.style.background='#e0e0e0'"></div>
                <div class="modal-info">
                    <h2>${game.title}</h2>
                    <div>${(game.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
                    <p style="margin-top:12px;">${game.description||''}</p>
                    ${game.previewImages?.length ? `<div class="preview-row">${game.previewImages.map(img => `<img src="${img}" onclick="openImageViewer('${img}')">`).join('')}</div>` : ''}
                    <div style="margin-top:16px;">
                        ${['PC','krkr','Ty','ONS','android_direct'].map(k => {
                            const has = game.platforms?.some(p => (k==='PC'?p.type==='PC':p.sub===k));
                            const dl = game.downloads?.[k] || {};
                            if (!has) return `<button class="dl-btn" disabled>${k} (无资源)</button>`;
                            if (dl.url) return `<button class="dl-btn" data-url="${dl.url}" data-source="${dl.source||''}" data-instructions="${dl.instructions||''}" onclick="confirmDownload(this)">${k} | ${dl.source||''}</button>`;
                            return `<button class="dl-btn" disabled>${k} (待添加)</button>`;
                        }).join('')}
                    </div>
                </div>`;
            // 点赞与评分
            const likeRes = await fetch(`${API_BASE}/api/likes/${id}?userId=${userId}`).then(r=>r.json());
            document.getElementById('likeSection').innerHTML = `<button class="like-btn ${likeRes.liked?'liked':''}" onclick="toggleLike(${id})">❤️ ${likeRes.liked?'已赞':'点赞'}</button> <span>${likeRes.count} 人赞过</span>`;
            const ratingRes = await fetch(`${API_BASE}/api/ratings/${id}?userId=${userId}`).then(r=>r.json());
            let stars = '';
            for (let i=1; i<=5; i++) stars += `<span class="rating-star ${i<=ratingRes.myRating?'filled':''}" onclick="submitRating(${id},${i})">★</span>`;
            document.getElementById('ratingSection').innerHTML = `<span>评分：</span><div style="display:inline;">${stars}</div> <span>(${ratingRes.average?.toFixed(1) || 0} 分)</span>`;
            // 评论
            const comments = await fetch(`${API_BASE}/api/comments/${id}`).then(r=>r.json());
            document.getElementById('commentSection').innerHTML = `
                <h3>评论 (${comments.length})</h3>
                ${comments.map(c => `<div class="comment-item"><b>${escapeHtml(c.name)}</b> <small>${new Date(c.time).toLocaleString()}</small><p>${escapeHtml(c.text)}</p></div>`).join('')}
                <div style="display:flex; gap:8px; margin-top:12px;">
                    <input id="cmName" placeholder="名字" style="flex:1; padding:8px; border-radius:20px; border:1px solid var(--border);">
                    <input id="cmText" placeholder="评论..." style="flex:2; padding:8px; border-radius:20px; border:1px solid var(--border);">
                    <button class="dl-btn" onclick="submitComment(${id})">发送</button>
                </div>`;
            modal.classList.add('open');
        }

        function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
        function openImageViewer(src) { const v = document.getElementById('imgViewer'); document.getElementById('imgViewerImg').src = src; v.classList.add('active'); }
        function confirmDownload(btn) {
            const url = btn.dataset.url;
            const source = btn.dataset.source || '未知';
            const instructions = btn.dataset.instructions || '';
            const overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;inset:0;z-index:999;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;';
            overlay.innerHTML = `<div style="background:var(--bg-modal); padding:24px; border-radius:var(--radius);"><h3>确认下载</h3><p>来源：${source}</p>${instructions ? `<p>说明：${instructions}</p>` : ''}<div style="margin-top:16px; text-align:right;"><button onclick="this.closest('div').parentElement.remove()">取消</button> <button onclick="window.open('${url}','_blank');this.closest('div').parentElement.remove()">确认下载</button></div></div>`;
            overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
            document.body.appendChild(overlay);
        }
        async function toggleLike(id) { await fetch(`${API_BASE}/api/likes/${id}`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({userId}) }); openGameDetail(id); }
        async function submitRating(id, rating) { await fetch(`${API_BASE}/api/ratings/${id}`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({userId, rating}) }); openGameDetail(id); }
        async function submitComment(id) { const name = document.getElementById('cmName').value.trim(); const text = document.getElementById('cmText').value.trim(); if (!name||!text) return; await fetch(`${API_BASE}/api/comments/${id}`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name, text}) }); openGameDetail(id); }
        function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

        // 主题切换
        function toggleTheme() { document.body.classList.toggle('dark'); localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light'); document.getElementById('themeToggle').textContent = document.body.classList.contains('dark') ? '☀️' : '🌓'; }
        (function initTheme() { const saved = localStorage.getItem('theme') || 'light'; if (saved === 'dark') document.body.classList.add('dark'); document.getElementById('themeToggle').textContent = saved === 'dark' ? '☀️' : '🌓'; })();

        // 在线计时与特效
        setInterval(() => {
            window.onlineSec = (window.onlineSec||0) + 1;
            const sec = window.onlineSec, h = Math.floor(sec/3600), m = Math.floor(sec%3600/60), s = sec%60;
            const el = document.getElementById('onlineTimer');
            if (el) el.textContent = `在线 ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }, 1000);

        // 雪花特效
        function initSnow() {
            const canvas = document.getElementById('particleCanvas');
            const ctx = canvas.getContext('2d');
            let particles = [];
            const count = 40;
            canvas.width = innerWidth; canvas.height = innerHeight;
            window.addEventListener('resize', () => { canvas.width = innerWidth; canvas.height = innerHeight; });
            for (let i=0; i<count; i++) particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*2+1, speed: 0.3+Math.random()*0.5, wind: Math.random()*0.2-0.1 });
            function draw() {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                particles.forEach(p => {
                    p.y += p.speed; p.x += p.wind;
                    if (p.y > canvas.height) { p.y = -10; p.x = Math.random()*canvas.width; }
                    if (p.x > canvas.width) p.x = 0;
                    if (p.x < 0) p.x = canvas.width;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(${document.body.classList.contains('dark')?'255':'200'},255,255,0.5)`;
                    ctx.fill();
                });
                requestAnimationFrame(draw);
            }
            draw();
        }

        // 启动
        window.addEventListener('load', async () => {
            await fetchGames();
            document.getElementById('bootScreen').classList.add('hidden');
            document.getElementById('appContainer').classList.add('visible');
            renderHome();
            initSnow();
            window.addEventListener('scroll', () => {
                document.getElementById('backTop').style.display = window.scrollY > 400 ? 'flex' : 'none';
            });
            window.addEventListener('hashchange', () => {
                const hash = window.location.hash.slice(1);
                if (hash.startsWith('detail/')) { openGameDetail(parseInt(hash.split('/')[1])); }
                else if (hash === 'category') navigateTo('category');
                else navigateTo('home');
            });
        });
    </script>
</body>
</html>
